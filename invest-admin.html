<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invest Admin</title>
<style>
body{background:#111;color:#fff;font-family:Arial}
.card{background:#1c1c1c;margin:10px;padding:15px;border-radius:12px}
button{padding:8px;margin-top:8px}
.approve{background:green;color:#fff}
</style>
</head>

<body>

<h2 style="text-align:center">💰 Invest Admin Panel</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);
const list = document.getElementById("list");

async function load(){

  const snap = await getDocs(collection(db,"invests"));

  list.innerHTML = "";

  snap.forEach(d=>{

    let x = d.data();

    if(x.status !== "PENDING") return;

    list.innerHTML += `
    <div class="card">
      📧 ${x.email}<br>
      💰 Invest: ₹${x.amount}<br>
      🎁 Reward: ₹${x.reward}<br>
      <button class="approve" onclick="approve('${d.id}','${x.email}',${x.reward})">
        Approve
      </button>
    </div>
    `;
  });

}

window.approve = async (id,email,reward)=>{

  const users = await getDocs(
    query(collection(db,"users"), where("email","==",email))
  );

  users.forEach(async u=>{

    let data = u.data();

    let newBalance = (data.balance || 0) + reward;
    let newWager = (data.wagerRequired || 0) + reward;

    await updateDoc(doc(db,"users",u.id),{
      balance: newBalance,
      wagerRequired: newWager
    });

  });

  await updateDoc(doc(db,"invests",id),{
    status:"APPROVED"
  });

  alert("Approved ✅");

  load();

}

load();

</script>

</body>
</html>
