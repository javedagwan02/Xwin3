<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit History – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  padding-bottom:80px;
}
.header{
  background:linear-gradient(135deg,#ff6a6a,#ff8e8e);
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.list{
  padding:15px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.row{
  display:flex;
  justify-content:space-between;

}
.status{font-weight:bold}
.pending{color:#f57c00}
.approved{color:#2e7d32}
.rejected{color:#c62828}
.empty{

}
</style>
</head>

<body>

<div class="header">📥 Deposit History</div>
<div class="list" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const email = localStorage.getItem("userEmail");

async function loadDeposits(){
  list.innerHTML = "";

  const q = query(
    collection(db,"deposits"),
    where("email","==",email)
  );

  const snap = await getDocs(q);

  if(snap.empty){
    list.innerHTML = `<div class="empty">No deposit history found</div>`;
    return;
  }

  // 🔥 STEP 1: ARRAY BANAAO
  let deposits = [];

  snap.forEach(doc=>{
    deposits.push(doc.data());
  });

  // 🔥 STEP 2: SORT (LATEST FIRST)
  deposits.sort((a,b)=>{
    return (b.time || 0) - (a.time || 0);
  });

      d.status === "REJECTED" ? "rejected" : "pending";

loadDeposits();
</script>

</body>
</html>
