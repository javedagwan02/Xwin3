<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("images/28096-removebg-preview.png") no-repeat center;
  background-size:cover;
  color:#fff;
  text-align:center;
}

/* MAIN */
.app{
  max-width:420px;
  margin:auto;
}

/* HEADER */
.header{
  padding:10px;
  font-size:22px;
  font-weight:bold;
}

/* TIMER */
.timer{
  margin:10px;
  font-size:18px;
  color:#ffd700;
}


/* BET AREAS (invisible clickable) */
.zone{
  position:absolute;
  cursor:pointer;
}

/* LEFT = BELOW */
.low{
  left:5%;
  top:20%;
  width:30%;
  height:60%;
}

/* RIGHT = ABOVE */
.high{
  right:5%;
  top:20%;
  width:30%;
  height:60%;
}

/* CENTER = EXACT */
.mid{
  left:35%;
  top:45%;
  width:30%;
  height:30%;
}

/* ACTIVE GLOW */
.active{
  box-shadow:0 0 15px #ffd700 inset;
  border-radius:10px;
}

/* DICE */
.dice{
  margin:15px;
  font-size:24px;
}

/* RESULT */
.result{
  font-size:18px;
  margin:10px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

.chips div{
  background:#444;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

.active-chip{
  background:#ffd700;
  color:#000;
}

/* BUTTON */
.btn{
  margin:15px;
  padding:12px;
  background:#222;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">7 UP DOWN</div>

<div class="timer">Time: <span id="time">15</span></div>

<!-- 🎯 TABLE -->
<div class="table">

  <div class="zone low" onclick="selectBet('LOW',this)"></div>
  <div class="zone high" onclick="selectBet('HIGH',this)"></div>
  <div class="zone mid" onclick="selectBet('MID',this)"></div>

</div>

<div class="dice" id="dice">🎲 🎲</div>

<div class="result" id="result">Place Bet</div>

<!-- 💰 CHIPS -->
<div class="chips">
  <div onclick="setChip(10,this)">10</div>
  <div onclick="setChip(50,this)">50</div>
  <div onclick="setChip(100,this)">100</div>
  <div onclick="setChip(500,this)">500</div>
  <div onclick="setChip(1000,this)">1000</div>
</div>

<div class="btn" onclick="startGame()">REBET</div>

</div>

<script>

let chip = 0;
let betType = "";
let interval;

// 🎯 CHIP
function setChip(val,el){
  chip = val;
  document.querySelectorAll(".chips div").forEach(e=>e.classList.remove("active-chip"));
  el.classList.add("active-chip");
}

// 🎯 BET
function selectBet(type,el){
  betType = type;
  document.querySelectorAll(".zone").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// 🎲 ANIMATION
function rollAnim(cb){
  let i=0;
  let anim=setInterval(()=>{
    let r1=Math.floor(Math.random()*6)+1;
    let r2=Math.floor(Math.random()*6)+1;
    document.getElementById("dice").innerText="🎲 "+r1+" 🎲 "+r2;
    i++;
    if(i>10){
      clearInterval(anim);
      cb();
    }
  },100);
}

// 🚀 START
function startGame(){

  if(!chip) return alert("Select Chip");
  if(!betType) return alert("Select Bet");

  let t=15;

  interval=setInterval(()=>{
    document.getElementById("time").innerText=t;
    t--;

    if(t<0){
      clearInterval(interval);
      rollAnim(finalResult);
    }

  },1000);
}

// 🎯 RESULT
function finalResult(){

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;
  let total=d1+d2;

  document.getElementById("dice").innerText="🎲 "+d1+" 🎲 "+d2;

  let resultType;

  if(total<7) resultType="LOW";
  else if(total>7) resultType="HIGH";
  else resultType="MID";

  let msg="Total: "+total+" → ";

  if(resultType===betType){
    msg += resultType==="MID" ? "WIN 5x 🎉" : "WIN 2x 🎉";
  }else{
    msg += "LOSS ❌";
  }

  document.getElementById("result").innerText=msg;
}

</script>

</body>
</html>
