<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  background:linear-gradient(180deg,#3b0d4f,#1a0826);
  color:#fff;
}

/* TIMER */
.timer{
  text-align:center;
  font-size:22px;
  color:#ffd700;
  margin-top:10px;
}

/* TABLE WRAP */
.table-wrap{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 🎰 CASINO TABLE */
.table{
  width:90%;
  height:85%;
  position:relative;

  /* 🎯 SHAPE */
  border-radius:40px 40px 80px 80px;

  /* 🎯 GREEN */
  background:radial-gradient(circle at center,#166534,#0f3a23);

  /* 🎯 GOLD BORDER */
  border:4px solid #d4af37;

  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.6),
    0 0 20px rgba(0,0,0,0.8);
}

/* 🎯 INNER LINE (table design) */
.table::before{
  content:"";
  position:absolute;
  top:5%;
  left:5%;
  width:90%;
  height:90%;
  border-radius:30px 30px 70px 70px;
  border:2px solid rgba(255,255,255,0.2);
}

/* BOX COMMON */
.box{
  position:absolute;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  font-weight:bold;
}

/* BELOW */
.low{
  left:8%;
  top:15%;
  width:28%;
  height:60%;
}

/* ABOVE */
.high{
  right:8%;
  top:15%;
  width:28%;
  height:60%;
}

/* EXACT */
.mid{
  left:36%;
  bottom:8%;
  width:28%;
  height:30%;
}

/* ACTIVE EFFECT */
.active{
  border:2px solid #ffd700;
  box-shadow:0 0 20px #ffd700 inset;
}

/* DICE */
.dice{
  text-align:center;
  font-size:26px;
  margin-top:10px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.chips div{
  background:#444;
  padding:12px;
  border-radius:50%;
}

.active-chip{
  background:#ffd700;
  color:#000;
}

/* BUTTON */
.btn{
  margin:15px;
  padding:14px;
  background:#222;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="timer">Time: <span id="time">15</span></div>

<div class="table-wrap">

  <div class="table">

    <div class="box low" onclick="selectBet('LOW',this)">BELOW 7</div>
    <div class="box high" onclick="selectBet('HIGH',this)">ABOVE 7</div>
    <div class="box mid" onclick="selectBet('MID',this)">EXACT 7</div>

  </div>

</div>

<div class="dice" id="dice">🎲 🎲</div>

<div class="chips">
  <div onclick="setChip(10,this)">10</div>
  <div onclick="setChip(50,this)">50</div>
  <div onclick="setChip(100,this)">100</div>
  <div onclick="setChip(500,this)">500</div>
  <div onclick="setChip(1000,this)">1000</div>
</div>

<div class="btn" onclick="startGame()">REBET</div>

<script>

let chip=0;
let betType="";
let interval;

function setChip(v,e){
  chip=v;
  document.querySelectorAll(".chips div").forEach(el=>el.classList.remove("active-chip"));
  e.classList.add("active-chip");
}

function selectBet(type,el){
  betType=type;
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function startGame(){

  if(!chip) return alert("Select chip");
  if(!betType) return alert("Select bet");

  let t=15;

  interval=setInterval(()=>{
    document.getElementById("time").innerText=t;
    t--;

    if(t<0){
      clearInterval(interval);
      result();
    }

  },1000);
}

function result(){

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;

  document.getElementById("dice").innerText="🎲 "+d1+" 🎲 "+d2;

  let total=d1+d2;

  let type;
  if(total<7) type="LOW";
  else if(total>7) type="HIGH";
  else type="MID";

  if(type===betType){
    alert(type==="MID" ? "WIN 5x" : "WIN 2x");
  }else{
    alert("LOSS");
  }
}

</script>

</body>
</html>
