<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>towerX</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: skyblue;
      overflow: hidden;
    }
    #gameArea {
      position: relative;
      width: 100%;
      height: 500px;
      background: linear-gradient(skyblue, white);
      border-bottom: 3px solid #333;
    }
    .segment {
      position: absolute;
      width: 120px;
      height: 40px;
      background: #ffcc00;
      text-align: center;
      line-height: 40px;
      font-weight: bold;
      border: 2px solid #333;
    }
    #controls {
      margin: 20px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    #multiplier {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
    #popup {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border: 2px solid #333;
      display: none;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="gameArea"></div>
  <div id="controls">
    <button id="startBtn">Start</button>
    <button id="dropBtn">Drop</button>
    <button id="historyBtn">History</button>
    <div id="multiplier">Multiplier: 1.00x</div>
  </div>
  <div id="popup"></div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const startBtn = document.getElementById("startBtn");
    const dropBtn = document.getElementById("dropBtn");
    const multiplierDisplay = document.getElementById("multiplier");
    const popup = document.getElementById("popup");

    let fallingSegment = null;
    let towerHeight = 0;
    let multiplierIndex = 0;
    let gameActive = false;

    const multipliers = [
      1.02,1.08,1.14,1.21,1.29,1.37,1.46,1.56,1.67,1.80,1.94,2.09,2.27,2.47,
      2.69,2.95,3.24,3.58,3.98,4.45,5.01,5.68,6.49,7.49,8.74,10.33,12.39,15.15,
      18.94,24.35
    ];

    function createSegment(y=0) {
      const seg = document.createElement("div");
      seg.className = "segment";
      seg.textContent = "HALL";
      seg.style.top = y + "px";
      seg.style.left = "0px";
      gameArea.appendChild(seg);
      return seg;
    }

    function moveSegment() {
      if (!fallingSegment) return;
      let pos = 0;
      let direction = 1;
      const interval = setInterval(() => {
        if (!fallingSegment) { clearInterval(interval); return; }
        pos += direction * 5;
        if (pos > gameArea.offsetWidth - 120 || pos < 0) direction *= -1;
        fallingSegment.style.left = pos + "px";
      }, 50);
    }

    dropBtn.onclick = () => {
      if (!gameActive) return;
      if (fallingSegment) {
        // Drop current segment
        fallingSegment.style.top = (gameArea.offsetHeight - 40 - towerHeight) + "px";
        towerHeight += 40;
        multiplierIndex++;
        if (multiplierIndex < multipliers.length) {
          multiplierDisplay.textContent = "Multiplier: " + multipliers[multiplierIndex].toFixed(2) + "x";
        } else {
          multiplierDisplay.textContent = "Multiplier: MAX";
        }
        fallingSegment = null;
        fallingSegment = createSegment();
        moveSegment();
      }
    };

    startBtn.onclick = () => {
      if (!gameActive) {
        gameActive = true;
        startBtn.textContent = "Cash Out";
        towerHeight = 0;
        multiplierIndex = 0;
        multiplierDisplay.textContent = "Multiplier: 1.00x";
        gameArea.innerHTML = "";
        fallingSegment = createSegment();
        moveSegment();
      } else {
        // Cash out
        showPopup("🎉 You cashed out with " + multipliers[multiplierIndex].toFixed(2) + "x");
        resetGame();
      }
    };

    function showPopup(msg) {
      popup.textContent = msg;
      popup.style.display = "block";
      setTimeout(() => popup.style.display = "none", 3000);
    }

    function resetGame() {
      gameActive = false;
      startBtn.textContent = "Start";
      fallingSegment = null;
      towerHeight = 0;
      multiplierIndex = 0;
    }

    // Simulate loss if tower too high
    setInterval(() => {
      if (towerHeight > 400 && gameActive) {
        showPopup("🔥 Bad news, you lost");
        resetGame();
      }
    }, 1000);
  </script>
</body>
</html>
