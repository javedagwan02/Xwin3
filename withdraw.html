<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background: radial-gradient(circle at top,#0b001a,#000);
  color:#fff;
}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#1a0033,#000);
  box-shadow:0 0 15px #7b00ff;
}

/* MAIN CARD */
.card{
  margin:15px;
  border-radius:20px;
  padding:20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 0 25px rgba(123,0,255,0.4),
    inset 0 0 20px rgba(255,255,255,0.05);
}

/* BALANCE BOX */
.balance{
  text-align:center;
  margin-bottom:15px;
}

.balance span{
  font-size:28px;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 10px #00ff88;
}

/* TABS */
.tabs{
  display:flex;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:15px;
}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  color:#aaa;
  transition:.3s;
}

.tab.active{
  background:linear-gradient(45deg,#7b00ff,#ff00cc);
  color:#fff;
  font-weight:bold;
  box-shadow:0 0 12px #ff00cc;
}

/* FORM */
.form{display:none}
.form.active{display:block}

label{
  font-size:13px;
  opacity:.8;
}

/* INPUT BOX */
input{
  width:100%;
  padding:14px;
  margin:8px 0 14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  outline:none;
  box-shadow:inset 0 0 10px rgba(255,255,255,0.1);
}

/* BUTTON */
.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(90deg,#00c853,#00ff88);
  color:#000;
  box-shadow:0 0 15px #00ff88;
  transition:.3s;
}

.btn:active{
  transform:scale(0.97);
}

/* RULES BOX */
.rules{
  margin-top:15px;
  font-size:13px;
  padding:12px;
  border-radius:14px;

  background:rgba(255,0,0,0.08);
  border:1px solid rgba(255,0,0,0.3);

  box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.rules div{
  margin-bottom:8px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-box{
  background:linear-gradient(135deg,#1a002e,#2b003f);
  padding:25px;
  border-radius:16px;
  text-align:center;
  width:85%;
  box-shadow:0 0 25px rgba(255,0,255,0.5);
}

.popup-box.success h3{
  color:#00ff88;
}

.popup-box.error h3{
  color:#ff5252;
}

.popup-box button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00c853,#00ff88);
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🏦 Withdraw</div>

<div class="card">

  <div class="balance">
    Available Balance<br>
    ₹ <span id="balance">0.00</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab('upi',this)">UPI</div>
    <div class="tab" onclick="openTab('bank',this)">Bank</div>
  </div>

  <!-- UPI -->
  <div class="form active" id="upi">
    <label>Withdraw Amount (₹)</label>
    <input type="number" id="upiAmount" placeholder="Minimum ₹100">

    <label>UPI ID</label>
    <input type="text" id="upiId" placeholder="example@upi">

    <button class="btn" onclick="submitWithdraw()">Submit Withdraw</button>

    <div class="rules">
      <div>🔴 Withdraw time: <b>00:05 - 23:55</b></div>
      <div>🔴 Inday Remaining Withdrawal Times: <b>3</b></div>
      <div>🔴 Withdrawal amount range: <b>₹100 - ₹50,000</b></div>
      <div>🔴 Please confirm your beneficiary details carefully</div>
      <div>🔴 Wrong details may cause permanent loss</div>
      <div>🟡 Bet Required: ₹<b id="wagerText">0</b></div>
    </div>
  </div>

  <!-- BANK -->
  <div class="form" id="bank">
    <label>Withdraw Amount (₹)</label>
    <input type="number" id="bankAmount" placeholder="Minimum ₹100">

    <label>Account Holder Name</label>
    <input type="text" id="bankHolder">

    <label>Bank Name</label>
    <input type="text" id="bankName">

    <label>Account Number</label>
    <input type="number" id="bankAccount">

    <label>IFSC Code</label>
    <input type="text" id="bankIfsc">

    <button class="btn" onclick="submitWithdraw()">Submit Withdraw</button>
  </div>

</div>

<!-- 🔥 POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupBox">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <!-- ✅ ONLY CHANGE HERE -->
    <button id="popupOk">OK</button>
  </div>
</div>

<!-- 🔥 FIRESTORE LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const popup = document.getElementById("popup");
const popupBox = document.getElementById("popupBox");
const popupTitle = document.getElementById("popupTitle");
const popupMsg = document.getElementById("popupMsg");

/* 🔥 POPUP FIX */
function showPopup(type,title,msg){
  popupBox.className="popup-box "+type;
  popupTitle.innerText=title;
  popupMsg.innerText=msg;
  popup.style.display="flex";
}
function closePopup(){
  popup.style.display="none";
}
document.getElementById("popupOk").addEventListener("click", closePopup);

/* ===== LOAD BALANCE (FIRESTORE ONLY) ===== */
const userEmail = localStorage.getItem("userEmail");
let userDocId = "";
let balance = 0;

async function loadBalance(){
  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );
  snap.forEach(d=>{
    userDocId = d.id;
    balance = d.data().balance || 0;
  });
  document.getElementById("balance").innerText = balance.toFixed(2);
}
loadBalance();
  
import { onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

function loadWager(){

  const q = query(collection(db,"users"), where("email","==",userEmail));

  onSnapshot(q,(snap)=>{
    snap.forEach(d=>{
      let data = d.data();

      let required = data.wagerRequired || 0;
      let done = data.wagerDone || 0;

      let remaining = required - done;
      if(remaining < 0) remaining = 0;

      document.getElementById("wagerText").innerText = remaining;
    });
  });

}

loadWager();
/* ===== DAILY LIMIT RESET ===== */
const today = new Date().toDateString();
if(localStorage.getItem("withdrawDate") !== today){
  localStorage.setItem("withdrawDate", today);
  localStorage.setItem("withdrawCount", "0");
}
let withdrawCount = Number(localStorage.getItem("withdrawCount")) || 0;

/* ===== UI ===== */
window.openTab = function(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
};

/* ===== SUBMIT WITHDRAW ===== */
window.submitWithdraw = async function(){
  const snap = await getDocs(
  query(collection(db,"users"), where("email","==",userEmail))
);

let wager = 0;

snap.forEach(d=>{
  let data = d.data();
  let required = data.wagerRequired || 0;
  let done = data.wagerDone || 0;

  wager = required - done;
});

if(wager > 0){
  return showPopup("error","Bet Required","Complete betting ₹"+wager+" first");
}
  const isUpi = document.getElementById("upi").classList.contains("active");
  const amt = Number(isUpi ? upiAmount.value : bankAmount.value);

  if(amt < 100) return showPopup("error","Minimum Withdraw","Minimum ₹100");
  if(amt > balance) return showPopup("error","Insufficient Balance","Not enough balance");
  if(withdrawCount >= 3) return showPopup("error","Limit Reached","Daily 3 withdraw limit exceeded");

await updateDoc(doc(db,"users",userDocId),{
  balance: balance - amt,

  // 🔥 RESET WAGER AFTER WITHDRAW
  wagerRequired: 0,
  wagerDone: 0
});

  await addDoc(collection(db,"withdraws"),{
  email: userEmail,
  amount: amt,
  method: isUpi ? "UPI" : "BANK",
  upiId: isUpi ? upiId.value.trim() : "",
  bankDetails: !isUpi ? {
    holder: bankHolder.value,
    bank: bankName.value,
    account: bankAccount.value,
    ifsc: bankIfsc.value
  } : null,
  status: "PENDING",
  time: Date.now(),   // ✅ comma add
  timeStamp: Date.now()               // ✅ now ok
});

  withdrawCount++;
  localStorage.setItem("withdrawCount",withdrawCount);

  showPopup("success","Withdraw Submitted","Amount deducted successfully");
  loadBalance();
};
</script>

</body>
</html>
