<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎮 Game Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:#00c853;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,255,150,0.3);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00e676;
  color:#000;
  font-weight:bold;
  font-size:16px;
}

.game-list{
  margin-top:20px;
}

.game-item{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.game-item img{
  width:50px;
  height:50px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🎮 GAME ADMIN PANEL</div>

<div class="container">

  <div class="card">
    <h3>Add New Game</h3>

    <input type="text" id="gameName" placeholder="Game Name (e.g. Game 40)">
    <input type="text" id="gameImage" placeholder="Image Path (images/xxx.png)">
    <input type="text" id="gameUID" placeholder="Game UID">

    <button onclick="addGame()">➕ Add Game</button>
  </div>

  <div class="game-list" id="gameList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

const list = document.getElementById("gameList");

/* 🔥 ADD GAME */
window.addGame = async function(){

  let name = document.getElementById("gameName").value.trim();
  let image = document.getElementById("gameImage").value.trim();
  let uid = document.getElementById("gameUID").value.trim();

  if(!name || !image || !uid){
    alert("❌ Fill all fields");
    return;
  }

  await addDoc(collection(db,"games"),{
    name: name,
    image: image,
    gameId: uid,
    minBalance: 10,
    time: Date.now()
  });

  alert("✅ Game Added");

  // clear inputs
  document.getElementById("gameName").value="";
  document.getElementById("gameImage").value="";
  document.getElementById("gameUID").value="";
};

/* 🔥 LIVE GAME LIST */
onSnapshot(collection(db,"games"), (snap)=>{

  list.innerHTML = "";

  snap.forEach(d=>{

    let g = d.data();

    list.innerHTML += `
      <div class="game-item">
        <div>
          <b>${g.name}</b><br>
          <small>${g.gameId}</small>
        </div>

        <img src="${g.image}">

        <button onclick="deleteGame('${d.id}')" style="background:red;color:#fff;width:auto;padding:6px 10px;">
          ❌
        </button>
      </div>
    `;
  });

});

/* 🔥 DELETE GAME */
window.deleteGame = async function(id){

  if(!confirm("Delete this game?")) return;

  await deleteDoc(doc(db,"games",id));

  alert("Deleted ✅");
};

</script>

</body>
</html>
