<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIN GO PRO</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
color:#111;
}

.header{
background:#ff6f6f;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#fff;
}

.wallet-box{
background:#fff;
margin:10px;
padding:15px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.game-tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
}

.game-tabs button{
padding:10px;
border:none;
border-radius:10px;
background:#ddd;
font-weight:bold;
}

.active-game{
background:#ff6f6f !important;
color:#fff;
}

.timer-card{
background:#ff6f6f;
margin:10px;
padding:15px;
border-radius:15px;
color:#fff;
text-align:center;
}

.timer{
font-size:45px;
font-weight:bold;
}

.period{
font-size:18px;
margin-top:8px;
}

.colors{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.colors button{
padding:15px;
border:none;
border-radius:12px;
color:#fff;
font-size:18px;
font-weight:bold;
}

.green{background:#1db954;}
.red{background:#ff3b30;}
.violet{background:#9c27b0;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.numbers button{
height:60px;
border:none;
border-radius:50%;
font-size:22px;
font-weight:bold;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.bigsmall{
display:flex;
padding:10px;
gap:10px;
}

.bigsmall button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
color:#fff;
}

.big{
background:#f4a261;
}

.small{
background:#4dabf7;
}

.card{
background:#fff;
margin:10px;
padding:10px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#ff6f6f;
color:#fff;
}

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:flex-end;
justify-content:center;
z-index:9999;
}

.popup{
background:#fff;
width:100%;
max-width:500px;
border-radius:20px 20px 0 0;
padding:20px;
}

.popup h2{
text-align:center;
}

.bet-amounts{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.bet-amounts button{
padding:12px;
border:none;
border-radius:10px;
font-size:18px;
}

.multi-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:15px;
}

.multi-grid button{
padding:10px;
border:none;
border-radius:10px;
}

.total-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#f4a261;
color:#fff;
font-size:22px;
font-weight:bold;
}

.lock{
opacity:.5;
pointer-events:none;
}


/* HISTORY BUTTONS */
.history-tabs{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.history-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
}

.activeTab{
  background:#ff6b6b;
  color:#fff;
}

.inactiveTab{
  background:#ececec;
  color:#777;
}

/* MY BET CARD */
.bet-card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  color:#000;
}

.bet-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.bet-type{
  padding:8px 16px;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
}

.bet-win{
  border:2px solid #22c55e;
  color:#22c55e;
  padding:6px 14px;
  border-radius:10px;
  font-weight:bold;
}

.bet-loss{
  border:2px solid #ef4444;
  color:#ef4444;
  padding:6px 14px;
  border-radius:10px;
  font-weight:bold;
}
  /* NUMBER STYLE */

.num{
height:62px;
width:62px;
border-radius:50% !important;
font-size:30px !important;
font-weight:bold;
border:none;
color:#fff;
box-shadow:0 3px 8px rgba(0,0,0,.25);
}

.numbers button{
width:58px;
height:58px;
border:none;
border-radius:50%;
font-size:30px;
font-weight:bold;
color:#fff !important;
box-shadow:0 3px 8px rgba(0,0,0,.25);
}

/* PURPLE */
.num0,
.num5{
background:linear-gradient(135deg,#d946ef,#9333ea) !important;
}

/* GREEN */
.num1,
.num3,
.num7,
.num9{
background:linear-gradient(135deg,#22c55e,#16a34a) !important;
}

/* RED */
.num2,
.num4,
.num6,
.num8{
background:linear-gradient(135deg,#ff4d4d,#dc2626) !important;
}
  /* RESULT POPUP */

#popupOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
animation:fadeIn .25s ease;
}

#popupBox{
width:85%;
max-width:320px;
animation:pop .25s ease;
}

@keyframes pop{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}
</style>
</head>

<body>

<div class="header">
2Xwin WIN GO
</div>

<div class="wallet-box">
Wallet ₹<span id="wallet">0</span>
</div>

<div class="game-tabs">

<button id="btnw30" class="active-game" onclick="switchGame('w30')">
30Sec
</button>

<button id="btnw1" onclick="switchGame('w1')">
1Min
</button>

<button id="btnw3" onclick="switchGame('w3')">
3Min
</button>

<button id="btnw5" onclick="switchGame('w5')">
5Min
</button>

</div>

<div class="timer-card">

<div class="timer" id="time">
30
</div>

<div class="period">
Period:
<span id="period"></span>
</div>

</div>

<div id="betArea">

<div class="colors">

<button class="green"
onclick="openBetModal('color','GREEN')">
GREEN
</button>

<button class="violet"
onclick="openBetModal('color','VIOLET')">
VIOLET
</button>

<button class="red"
onclick="openBetModal('color','RED')">
RED
</button>

</div>

<div class="numbers">

<button class="num0" onclick="openBetModal('number',0)">0</button>
<button class="num1" onclick="openBetModal('number',1)">1</button>
<button class="num2" onclick="openBetModal('number',2)">2</button>
<button class="num3" onclick="openBetModal('number',3)">3</button>
<button class="num4" onclick="openBetModal('number',4)">4</button>

<button class="num5" onclick="openBetModal('number',5)">5</button>
<button class="num6" onclick="openBetModal('number',6)">6</button>
<button class="num7" onclick="openBetModal('number',7)">7</button>
<button class="num8" onclick="openBetModal('number',8)">8</button>
<button class="num9" onclick="openBetModal('number',9)">9</button>

</div>
<div class="bigsmall">

<button class="big"
onclick="openBetModal('bs','BIG')">
BIG
</button>

<button class="small"
onclick="openBetModal('bs','SMALL')">
SMALL
</button>

</div>

</div>

<div class="card">

<div class="history-tabs">

<button class="history-btn activeTab"
onclick="showTab('game',this)">
Game History
</button>

<button class="history-btn inactiveTab"
onclick="showTab('bets',this)">
My Bets
</button>

</div>

<div id="historyArea"></div>

</div>

<div class="popup-overlay" id="betModal">

<div class="popup">

<h2 id="selectedBet"></h2>

<div class="bet-amounts">

<button onclick="setAmount(1)">1</button>
<button onclick="setAmount(10)">10</button>
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(1000)">1000</button>

</div>

<div class="multi-grid">

<button onclick="setMulti(1)">X1</button>
<button onclick="setMulti(5)">X5</button>
<button onclick="setMulti(10)">X10</button>
<button onclick="setMulti(20)">X20</button>
<button onclick="setMulti(50)">X50</button>

</div>

<button class="total-btn"
onclick="confirmBet()">

Total Amount ₹
<span id="totalAmount">
1
</span>

</button>

</div>

</div>

<script>

let wallet = 5000;

const GAME_TIMES = {
w30:30,
w1:60,
w3:180,
w5:300
};

let currentGame = "w30";

let games = {

w30:{
time:30,
period:20260120100001,
history:[],
mybets:[]
},

w1:{
time:60,
period:20260120110001,
history:[],
mybets:[]
},

w3:{
time:180,
period:20260120130001,
history:[],
mybets:[]
},

w5:{
time:300,
period:20260120150001,
history:[],
mybets:[]
}

};

let currentType = "";
let currentValue = "";

let amount = 1;
let multi = 1;
  let tab = "game";
  let pendingBets = [];

function S(){
return games[currentGame];
}

function render(){

walletEl.innerText = wallet;

time.innerText = S().time;

period.innerText = S().period;

draw();

if(S().time <= 5){
betArea.classList.add("lock");
}else{
betArea.classList.remove("lock");
}

}

const walletEl = document.getElementById("wallet");

function switchGame(g){

currentGame = g;

document.querySelectorAll(".game-tabs button")
.forEach(b=>b.classList.remove("active-game"));

document.getElementById("btn"+g)
.classList.add("active-game");

render();

}
  function showTab(t,e){

tab=t;

document.querySelectorAll(".history-btn")
.forEach(btn=>{

btn.classList.remove("activeTab");
btn.classList.add("inactiveTab");

});

e.classList.remove("inactiveTab");
e.classList.add("activeTab");

draw();

}

function openBetModal(type,val){

if(S().time <= 5){
alert("Bet Locked");
return;
}

currentType = type;
currentValue = val;

selectedBet.innerText =
type + " : " + val;

betModal.style.display = "flex";

}

function setAmount(x){

amount = x;

updateTotal();

}

function setMulti(x){

multi = x;

updateTotal();

}

function updateTotal(){

totalAmount.innerText =
amount * multi;

}


function confirmBet(){

let total = amount * multi;

if(total > wallet){
alert("Low Balance");
return;
}

wallet -= total;

betModal.style.display = "none";

/* BET SUCCESS POPUP */
showPopup(
"success",
"Bet Placed Successfully"
);

/* SAVE BET */
pendingBets.push({

game:currentGame,
type:currentType,
value:currentValue,
amount:total,
period:S().period

});

render();
draw();

}
function showPopup(type,msg){

popupOverlay.style.display="flex";

if(type=="win"){

popupBox.innerHTML=`
<div style="
background:linear-gradient(180deg,#ff7a59,#ff4d4d);
padding:25px;
border-radius:25px;
text-align:center;
color:#fff">

<h1>Congratulations</h1>

<div style="font-size:22px">
${msg}
</div>

</div>
`;

}else if(type=="loss"){

popupBox.innerHTML=`
<div style="
background:linear-gradient(180deg,#dbeafe,#bfdbfe);
padding:25px;
border-radius:25px;
text-align:center;
color:#334155">

<h1>Sorry</h1>

<div style="font-size:22px">
${msg}
</div>

</div>
`;

}else{

popupBox.innerHTML=`
<div style="
background:#fff;
padding:25px;
border-radius:25px;
text-align:center;
color:#000">

${msg}

</div>
`;

}

setTimeout(()=>{
popupOverlay.style.display="none";
},3000);

}
function draw(){

let area = document.getElementById("historyArea");

if(tab=="game"){

  let html = `
  <table>
    <thead>
      <tr>
        <th>Period</th>
        <th>Number</th>
        <th>Big Small</th>
        <th>Color</th>
      </tr>
    </thead>
    <tbody>
  `;

S().history.slice(0,10).forEach(r=>{

    let clr =
      r.c=="GREEN" ? "#22c55e" :
      r.c=="RED" ? "#ef4444" :
      "#a855f7";

    html += `
    <tr>
      <td>${r.p}</td>

      <td style="
        color:${clr};
        font-size:28px;
        font-weight:bold">
        ${r.n}
      </td>

      <td>${r.bs}</td>

      <td>
        <div style="
          width:14px;
          height:14px;
          border-radius:50%;
          background:${clr};
          margin:auto">
        </div>
      </td>

    </tr>`;
  });

  html += "</tbody></table>";

  area.innerHTML = html;

}else{

  let html = "";

S().mybets.slice(0,10).forEach(b=>{

    html += `

    <div class="bet-card">

      <div class="bet-top">

        <div class="bet-type"
        style="
        background:
        ${b.b.includes('Big') ? '#f59e0b' :
          b.b.includes('Small') ? '#60a5fa' :
          '#ff6b6b'}">

          ${b.b}

        </div>

        <div class="${
          b.w ? 'bet-win':'bet-loss'
        }">

          ${b.w ? 'Succeed':'Failed'}

        </div>

      </div>

      <div style="margin-top:10px;color:#777">
        ${b.p}
      </div>

      <div style="
      margin-top:8px;
      font-size:22px;
      font-weight:bold;
      color:${b.w ? '#22c55e':'#ef4444'}">

        ${b.r}

      </div>

    </div>
    `;
  });

  area.innerHTML = html;
}
}

setInterval(()=>{

games.w30.time--;

if(games.w30.time <= 0){

games.w30.time = 30;

}

render();

},1000);
render();
</script>
<!-- RESULT POPUP -->

<div class="popup-overlay" id="popupOverlay">

<div id="popupBox"></div>

</div>
  <script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e",
  storageBucket: "colourcash-ea60e.firebasestorage.app",
  messagingSenderId: "403688058646",
  appId: "1:403688058646:web:f1753360471528f275ea37"
};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LIVE RESULT LISTENER */

onSnapshot(doc(db,"gameStatus","w30"),(snap)=>{

let d = snap.data();

if(!d) return;

/* RESULT */

let n = d.result;

let c =
[1,3,7,9].includes(n)
?"GREEN"
:[2,4,6,8].includes(n)
?"RED"
:"VIOLET";

let bs = n >= 5
? "BIG"
: "SMALL";

/* SAVE HISTORY */

games.w30.history.unshift({

p:d.period,
n:n,
bs:bs,
c:c

});

/* AUTO UPDATE PERIOD */

games.w30.period = Number(d.period);

/* RE-RENDER */

draw();
render();

});

</script>
</body>
</html>
