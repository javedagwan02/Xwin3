<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIN GO PRO</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
color:#111;
}

.header{
background:#ff6f6f;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#fff;
}

.wallet-box{
background:#fff;
margin:10px;
padding:15px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.game-tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
}

.game-tabs button{
padding:10px;
border:none;
border-radius:10px;
background:#ddd;
font-weight:bold;
}

.active-game{
background:#ff6f6f !important;
color:#fff;
}

.timer-card{
background:#ff6f6f;
margin:10px;
padding:15px;
border-radius:15px;
color:#fff;
text-align:center;
}

.timer{
font-size:45px;
font-weight:bold;
}

.period{
font-size:18px;
margin-top:8px;
}

.colors{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.colors button{
padding:15px;
border:none;
border-radius:12px;
color:#fff;
font-size:18px;
font-weight:bold;
}

.green{background:#1db954;}
.red{background:#ff3b30;}
.violet{background:#9c27b0;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.numbers button{
height:60px;
border:none;
border-radius:50%;
font-size:22px;
font-weight:bold;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.bigsmall{
display:flex;
padding:10px;
gap:10px;
}

.bigsmall button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
color:#fff;
}

.big{
background:#f4a261;
}

.small{
background:#4dabf7;
}

.card{
background:#fff;
margin:10px;
padding:10px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#ff6f6f;
color:#fff;
}

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:flex-end;
justify-content:center;
z-index:9999;
}

.popup{
background:#fff;
width:100%;
max-width:500px;
border-radius:20px 20px 0 0;
padding:20px;
}

.popup h2{
text-align:center;
}

.bet-amounts{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.bet-amounts button{
padding:12px;
border:none;
border-radius:10px;
font-size:18px;
}

.multi-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:15px;
}

.multi-grid button{
padding:10px;
border:none;
border-radius:10px;
}

.total-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#f4a261;
color:#fff;
font-size:22px;
font-weight:bold;
}

.lock{
opacity:.5;
pointer-events:none;
}

</style>
</head>

<body>

<div class="header">
91 CLUB WIN GO
</div>

<div class="wallet-box">
Wallet ₹<span id="wallet">0</span>
</div>

<div class="game-tabs">

<button id="btnw30" class="active-game" onclick="switchGame('w30')">
30Sec
</button>

<button id="btnw1" onclick="switchGame('w1')">
1Min
</button>

<button id="btnw3" onclick="switchGame('w3')">
3Min
</button>

<button id="btnw5" onclick="switchGame('w5')">
5Min
</button>

</div>

<div class="timer-card">

<div class="timer" id="time">
30
</div>

<div class="period">
Period:
<span id="period"></span>
</div>

</div>

<div id="betArea">

<div class="colors">

<button class="green"
onclick="openBetModal('color','GREEN')">
GREEN
</button>

<button class="violet"
onclick="openBetModal('color','VIOLET')">
VIOLET
</button>

<button class="red"
onclick="openBetModal('color','RED')">
RED
</button>

</div>

<div class="numbers">

<button onclick="openBetModal('number',0)">0</button>
<button onclick="openBetModal('number',1)">1</button>
<button onclick="openBetModal('number',2)">2</button>
<button onclick="openBetModal('number',3)">3</button>
<button onclick="openBetModal('number',4)">4</button>
<button onclick="openBetModal('number',5)">5</button>
<button onclick="openBetModal('number',6)">6</button>
<button onclick="openBetModal('number',7)">7</button>
<button onclick="openBetModal('number',8)">8</button>
<button onclick="openBetModal('number',9)">9</button>

</div>

<div class="bigsmall">

<button class="big"
onclick="openBetModal('bs','BIG')">
BIG
</button>

<button class="small"
onclick="openBetModal('bs','SMALL')">
SMALL
</button>

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Period</th>
<th>Number</th>
<th>BS</th>
<th>Color</th>
</tr>
</thead>

<tbody id="historyBody">
</tbody>

</table>

</div>

<div class="popup-overlay" id="betModal">

<div class="popup">

<h2 id="selectedBet"></h2>

<div class="bet-amounts">

<button onclick="setAmount(1)">1</button>
<button onclick="setAmount(10)">10</button>
<button onclick="setAmount(100)">100</button>
<button onclick="setAmount(1000)">1000</button>

</div>

<div class="multi-grid">

<button onclick="setMulti(1)">X1</button>
<button onclick="setMulti(5)">X5</button>
<button onclick="setMulti(10)">X10</button>
<button onclick="setMulti(20)">X20</button>
<button onclick="setMulti(50)">X50</button>

</div>

<button class="total-btn"
onclick="confirmBet()">

Total Amount ₹
<span id="totalAmount">
1
</span>

</button>

</div>

</div>

<script>

let wallet = 5000;

const GAME_TIMES = {
w30:30,
w1:60,
w3:180,
w5:300
};

let currentGame = "w30";

let games = {

w30:{
time:30,
period:20260120100001,
history:[]
},

w1:{
time:60,
period:20260120110001,
history:[]
},

w3:{
time:180,
period:20260120130001,
history:[]
},

w5:{
time:300,
period:20260120150001,
history:[]
}

};

let currentType = "";
let currentValue = "";

let amount = 1;
let multi = 1;

function S(){
return games[currentGame];
}

function render(){

walletEl.innerText = wallet;

time.innerText = S().time;

period.innerText = S().period;

drawHistory();

if(S().time <= 5){
betArea.classList.add("lock");
}else{
betArea.classList.remove("lock");
}

}

const walletEl = document.getElementById("wallet");

function switchGame(g){

currentGame = g;

document.querySelectorAll(".game-tabs button")
.forEach(b=>b.classList.remove("active-game"));

document.getElementById("btn"+g)
.classList.add("active-game");

render();

}

function openBetModal(type,val){

if(S().time <= 5){
alert("Bet Locked");
return;
}

currentType = type;
currentValue = val;

selectedBet.innerText =
type + " : " + val;

betModal.style.display = "flex";

}

function setAmount(x){

amount = x;

updateTotal();

}

function setMulti(x){

multi = x;

updateTotal();

}

function updateTotal(){

totalAmount.innerText =
amount * multi;

}

function confirmBet(){

let total = amount * multi;

if(total > wallet){
alert("Low Balance");
return;
}

wallet -= total;

betModal.style.display = "none";

let n = Math.floor(Math.random()*10);

let c =
[1,3,7,9].includes(n)
?"GREEN"
:[2,4,6,8].includes(n)
?"RED"
:"VIOLET";

let bs = n >= 5 ? "BIG":"SMALL";

let win = false;

if(currentType=="number" && currentValue==n)
win = true;

if(currentType=="color" && currentValue==c)
win = true;

if(currentType=="bs" && currentValue==bs)
win = true;

setTimeout(()=>{

if(win){

let reward = total * 2;

wallet += reward;

alert("YOU WIN ₹"+reward);

}else{

alert("YOU LOST ₹"+total);

}

},1000);

S().history.unshift({
period:S().period,
number:n,
bs:bs,
color:c
});

render();

}

function drawHistory(){

historyBody.innerHTML = "";

S().history.slice(0,10).forEach(r=>{

historyBody.innerHTML += `

<tr>

<td>${r.period}</td>

<td>${r.number}</td>

<td>${r.bs}</td>

<td>${r.color}</td>

</tr>

`;

});

}

setInterval(()=>{

Object.keys(games).forEach(g=>{

let game = games[g];

game.time--;

if(game.time <= 0){

game.time = GAME_TIMES[g];

game.period++;

}

});

render();

},1000);

render();

</script>

</body>
</html>
