<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#06296d,#4bbcff);
  color:#fff;
}

.deposit-wrap{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:10px;
  box-sizing:border-box;
}

.top-title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  color:#ffd84d;
  text-shadow:2px 3px #4d1aa8;
  padding:18px 0;
}

.panel{
  background:#bcd6ff;
  border:6px solid #3478d6;
  border-radius:18px;
  padding:12px;
  color:#174d91;
  box-shadow:0 5px 0 #1556ad;
}

.balance{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:#ffde39;
  text-shadow:2px 2px #1556ad;
  margin-bottom:10px;
}

.amount-input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:24px;
  font-weight:bold;
  box-sizing:border-box;
  color:#275aa0;
  background:#dce8ff;
  margin-bottom:12px;
}

.amount-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.amount-btn{
  position:relative;
  padding:16px 0;
  border:none;
  border-radius:28px;
  background:linear-gradient(#ffe76a,#ffae16);
  color:#7b3500;
  font-size:22px;
  font-weight:900;
  box-shadow:0 6px 0 #c46b00;
}

.amount-btn.active{
  background:linear-gradient(#6dff5c,#11b51b);
  color:#fff;
}

.bonus-tag{
  position:absolute;
  top:-12px;
  right:10px;
  background:#ffb31b;
  color:#fff;
  font-size:13px;
  padding:2px 9px;
  border-radius:12px;
  text-shadow:1px 1px #804000;
}

.offer{
  margin-top:18px;
  background:#20a8ff;
  border-radius:12px;
  padding:14px;
  color:#fff;
  font-size:18px;
  font-weight:900;
  text-align:center;
  text-shadow:1px 1px #003d7a;
}

.offer span{
  color:#ffd632;
  font-size:32px;
}

.payment-box{
  margin-top:15px;
  background:#42aefb;
  border-radius:14px;
  padding:14px;
  min-height:120px;
}

.label{
  font-size:24px;
  font-weight:bold;
  color:#fff;
  margin-bottom:14px;
  text-shadow:1px 2px #14589d;
}

.method-grid{
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.method{
  background:linear-gradient(135deg,#ff89d8,#c252ff);
  border:4px solid #fff;
  border-radius:14px;
  padding:18px 5px;
  color:#fff;
  font-size:22px;
  font-weight:900;
  text-align:center;
  position:relative;
}

.method.active::after{
  content:"✓";
  position:absolute;
  right:-12px;
  top:-18px;
  background:#944cff;
  border:4px solid #fff;
  color:white;
  width:36px;
  height:36px;
  border-radius:50%;
  line-height:36px;
  font-size:24px;
}

.select-msg{
  text-align:center;
  padding:35px 0;
  color:#1561a9;
  font-size:18px;
  font-weight:bold;
}

.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.summary div{
  background:#d5e6ff;
  border:4px solid #3478d6;
  border-radius:12px;
  text-align:center;
  padding:12px;
  color:#174d91;
  font-size:18px;
  font-weight:bold;
}

.note{
  background:#dcecff;
  color:#195aa2;
  padding:12px;
  border-radius:10px;
  margin-top:14px;
  font-size:14px;
  font-weight:bold;
}

.deposit-btn{
  width:90%;
  display:block;
  margin:18px auto 0;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(#ddd,#999);
  color:#fff;
  font-size:30px;
  font-weight:900;
  box-shadow:0 5px 0 #777;
}

.deposit-btn.active{
  background:linear-gradient(#fff06a,#ff9f13);
  color:#a93400;
  box-shadow:0 5px 0 #b86400;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  width:80%;
  background:#1a0033;
  padding:22px;
  border-radius:14px;
  text-align:center;
}

.popup-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="deposit-wrap">

  <div class="top-title">DEPOSIT</div>

  <div class="panel">

    <div class="balance">Balance ₹<span id="balance">0</span></div>

    <input class="amount-input" type="number" id="amount" placeholder="₹ Select or enter amount">

    <div class="amount-grid" id="amountGrid"></div>

    <div class="offer">
      DEPOSIT PLUS ₹100~50000<br>
      Extra <span>20%</span>
    </div>

    <div class="payment-box">
      <div class="label">Payment Method</div>

      <div id="selectMsg" class="select-msg">
        Please select recharge amount first.
      </div>

      <div class="method-grid" id="methodGrid">
        <div class="method" onclick="selectMethod(0)">UPI-11</div>
        <div class="method" onclick="selectMethod(1)">UPI-12</div>
        <div class="method" onclick="selectMethod(2)">UPI-13</div>
        <div class="method" onclick="selectMethod(3)">UPI-14</div>
      </div>
    </div>

    <div class="summary">
      <div>Cash<br>₹<span id="cash">0</span></div>
      <div>Bonus<br>₹<span id="bonus">0</span></div>
    </div>

    <div class="note">
      Typically, the funds you deposit will be credited within 1 minute.
      If recharge fails, try again or contact customer service.
    </div>

    <button class="deposit-btn" id="depositBtn" onclick="goPayment()">Deposit</button>

  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupText">Success</h3>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const upiMethods = [
  { name:"UPI-11", upi:"rajjabali72@upi" },
  { name:"UPI-12", upi:"rajjabali72@upi" },
  { name:"UPI-13", upi:"rajjabali72@upi" },
  { name:"UPI-14", upi:"rajjabali72@upi" }
];

const amounts = [100,200,300,500,1000,2000,3000,5000,10000,20000];

let selectedAmount = 0;
let selectedMethod = -1;

const amountGrid = document.getElementById("amountGrid");

amounts.forEach(a=>{
  let btn = document.createElement("button");
  btn.className = "amount-btn";
  btn.innerHTML = `${a.toLocaleString("en-IN")} <span class="bonus-tag">+20%</span>`;
  btn.onclick = () => selectAmount(a, btn);
  amountGrid.appendChild(btn);
});

window.selectAmount = function(a, btn){
  selectedAmount = a;
  document.getElementById("amount").value = a;

  document.querySelectorAll(".amount-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateAmount();
}

document.getElementById("amount").addEventListener("input",()=>{
  selectedAmount = Number(document.getElementById("amount").value);
  document.querySelectorAll(".amount-btn").forEach(b=>b.classList.remove("active"));
  updateAmount();
});

function updateAmount(){
  let amt = Number(document.getElementById("amount").value);

  document.getElementById("cash").innerText = amt || 0;
  document.getElementById("bonus").innerText = amt >= 100 ? Math.floor(amt * 0.20) : 0;

  if(amt >= 100){
    document.getElementById("selectMsg").style.display = "none";
    document.getElementById("methodGrid").style.display = "grid";
  }else{
    document.getElementById("selectMsg").style.display = "block";
    document.getElementById("methodGrid").style.display = "none";
    selectedMethod = -1;
    document.querySelectorAll(".method").forEach(m=>m.classList.remove("active"));
  }

  checkReady();
}

window.selectMethod = function(i){
  selectedMethod = i;

  document.querySelectorAll(".method").forEach(m=>m.classList.remove("active"));
  document.querySelectorAll(".method")[i].classList.add("active");

  checkReady();
}

function checkReady(){
  let amt = Number(document.getElementById("amount").value);
  let btn = document.getElementById("depositBtn");

  if(amt >= 100 && selectedMethod !== -1){
    btn.classList.add("active");
  }else{
    btn.classList.remove("active");
  }
}

window.goPayment = function(){
  let amt = Number(document.getElementById("amount").value);

  if(amt < 100){
    showPopup("Minimum ₹100 deposit required");
    return;
  }

  if(selectedMethod === -1){
    showPopup("Please select payment method");
    return;
  }

  let method = upiMethods[selectedMethod].name;
  let upi = upiMethods[selectedMethod].upi;

  window.location.href =
    `payment.html?amount=${amt}&method=${encodeURIComponent(method)}&upi=${encodeURIComponent(upi)}`;
}

window.showPopup = function(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
