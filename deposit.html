<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a001a;
  color:#fff;
}

.header{
  padding:18px;
  font-size:22px;
  text-align:center;
  font-weight:bold;
}

.card{
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:#1c1c1c;
}

.amounts{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.amounts button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:#fff;
}

input{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#333;
  color:#fff;
}

.pay{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#000;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">💰 Deposit</div>

<div class="card">

<div class="amounts">
  <button onclick="setAmount(100)">100</button>
  <button onclick="setAmount(200)">200</button>
  <button onclick="setAmount(300)">300</button>
  <button onclick="setAmount(500)">500</button>
  <button onclick="setAmount(1000)">1000</button>
  <button onclick="setAmount(5000)">5000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount">

<button class="pay" onclick="payNow()">PAY NOW</button>

</div>

<script>

function setAmount(a){
  document.getElementById("amount").value = a;
}

async function payNow(){

  let amt = document.getElementById("amount").value;
  const email = localStorage.getItem("userEmail");

  if(!email){
    alert("Login required");
    return;
  }

  if(amt < 100){
    alert("Minimum ₹100");
    return;
  }

  const res = await fetch("http://187.127.162.97:3000/create-order",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      amount: amt,
      email: email
    })
  });

  const data = await res.json();

  if(data.payUrl){
    window.location.href = data.payUrl;
  }else{
    alert(data.error || "Payment failed");
  }

}

</script>

</body>
</html>
