<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.row{
  margin:5px 0;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.approve{
  flex:1;
  padding:10px;
  background:#4caf50;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
}

.reject{
  flex:1;
  padding:10px;
  background:#f44336;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛠 Deposit Admin Panel</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);
const list = document.getElementById("list");

/* 🔥 LOAD DATA */
async function loadDeposits(){

  list.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"deposits"));

  list.innerHTML = "";

  snap.forEach(d=>{

    let data = d.data();
    if(data.isDemo) return;

    if(data.status !== "PENDING") return;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row">💰 Amount: ₹${data.amount}</div>
      <div class="row">🔑 UTR: ${data.utr}</div>
      <div class="row">📧 Email: ${data.email}</div>
      <div class="row">⏰ Time: ${new Date(data.time).toLocaleString()}</div>
      <div class="row">📌 Status: ${data.status}</div>

    

      <div class="btns">
        <button class="approve" onclick="approve('${d.id}','${data.email}',${data.amount})">Approve</button>
        <button class="reject" onclick="reject('${d.id}')">Reject</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* 🔥 APPROVE */
window.approve = async function(id,email,amount){

  try{

    const snap = await getDocs(
      query(collection(db,"users"), where("email","==",email))
    );

    if(snap.empty){
      alert("User not found ❌");
      return;
    }

    snap.forEach(async (u)=>{

      let userData = u.data();

let bal = userData.balance || 0;
let bonus = userData.bonusBalance || 0;
let firstDepositDone = userData.firstDepositDone || false;

let newBalance = bal + amount;
// 🔥 SPIN CALCULATION
let spinsToAdd = Math.floor(amount / 100);

let spin100 = userData.spin100 || 0;
let spin500 = userData.spin500 || 0;
let spin1000 = userData.spin1000 || 0;

if(amount >= 100 && amount < 500){
  spin100 += spinsToAdd;
}
else if(amount >= 500 && amount < 1000){
  spin500 += spinsToAdd;
}
else if(amount >= 1000){
  spin1000 += spinsToAdd;
}
// 🔥 FIRST DEPOSIT BONUS UNLOCK
if(!firstDepositDone && bonus > 0){
  newBalance += bonus; // bonus add
  bonus = 0; // bonus reset
  firstDepositDone = true;
}
// 🔥 TOTAL DEPOSIT TRACK
let totalDeposit = (userData.totalDeposit || 0) + amount;

// 🔥 BONUS UNLOCK SYSTEM
if(bonus > 0 && totalDeposit >= bonus * 4){
  newBalance += bonus;   // bonus main wallet me
  bonus = 0;             // reset
}
await updateDoc(doc(db,"users",u.id),{
  balance: newBalance,
  bonusBalance: bonus,
  totalDeposit: totalDeposit, // 🔥 ADD THIS

  firstDepositDone: firstDepositDone,
  hasDeposited: true,

  wagerRequired: (userData.wagerRequired || 0) + (amount * 2),
  wagerDone: userData.wagerDone || 0,

  unlocked100: (userData.unlocked100 || false) || amount >= 100,
  unlocked500: (userData.unlocked500 || false) || amount >= 500,
  unlocked1000: (userData.unlocked1000 || false) || amount >= 1000,

  spin100: spin100,
  spin500: spin500,
  spin1000: spin1000
});

    });

    await updateDoc(doc(db,"deposits",id),{
      status:"APPROVED"
    });

    alert("Approved ✅");

    loadDeposits();

  }catch(e){
    alert("Error: "+e.message);
  }
}
/* 🔥 REJECT */
window.reject = async function(id){

  await updateDoc(doc(db,"deposits",id),{
    status:"REJECTED"
  });

  alert("Rejected ❌");

  loadDeposits();
}
  

/* INIT */
loadDeposits();

</script>

</body>
</html>
