<!DOCTYPE html>
<html>
<head>
<title>User Login Data</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:15px}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>

<h2>🔐 User Login Details</h2>

<div id="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

async function load(){
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();

    document.getElementById("box").innerHTML += `
    <div class="card">
      <div>Email: ${u.email}</div>
      <div>Password: ${u.password || "N/A"}</div>
    </div>`;
  });
}

load();
</script>

</body>
</html>
