<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Tiger Game</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
  text-align:center;
}

.header{
  padding:15px;
  background:#111827;
}

.wallet{
  font-size:18px;
}

.game{
  margin-top:20px;
}

.cards{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:20px;
}

.card{
  width:100px;
  height:140px;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  border-radius:10px;
  transition:0.6s;
}

.flip{
  transform:rotateY(180deg);
}

.bets{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.bet-box{
  padding:20px;
  border-radius:10px;
  cursor:pointer;
}

.dragon{background:#ef4444;}
.tiger{background:#3b82f6;}

.chips{
  margin-top:20px;
}

.chip{
  padding:10px 15px;
  margin:5px;
  background:#10b981;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.timer{
  font-size:22px;
  margin-top:10px;
}

.result{
  margin-top:15px;
  font-size:20px;
}

.lock{
  opacity:0.5;
  pointer-events:none;
}
</style></head><body><div class="header">
  <div class="wallet">Wallet: ₹<span id="wallet">5000</span></div>
</div><div class="game"><div class="timer">Time: <span id="time">20</span></div><div class="cards">
  <div class="card" id="dragonCard">?</div>
  <div class="card" id="tigerCard">?</div>
</div><div class="bets">
  <div class="bet-box dragon" onclick="placeBet('dragon')">DRAGON</div>
  <div class="bet-box tiger" onclick="placeBet('tiger')">TIGER</div>
</div><div class="chips">
  <button class="chip" onclick="selectChip(10)">10</button>
  <button class="chip" onclick="selectChip(50)">50</button>
  <button class="chip" onclick="selectChip(100)">100</button>
  <button class="chip" onclick="selectChip(200)">200</button>
  <button class="chip" onclick="selectChip(500)">500</button>
  <button class="chip" onclick="selectChip(1000)">1000</button>
</div><div class="result" id="result"></div></div><script>
let wallet = 5000;
let selectedChip = 0;
let bets = {dragon:0, tiger:0};
let time = 20;
let locked = false;

function selectChip(amount){
  selectedChip = amount;
}

function placeBet(type){
  if(locked) return;
  if(selectedChip === 0) return alert("Select chip first");
  if(wallet < selectedChip) return alert("Low balance");

  wallet -= selectedChip;
  bets[type] += selectedChip;

  updateWallet();
}

function updateWallet(){
  document.getElementById("wallet").innerText = wallet;
}

function randomCard(){
  return Math.floor(Math.random()*13)+1;
}

function showResult(){
  let d = randomCard();
  let t = randomCard();

  let dragonCard = document.getElementById("dragonCard");
  let tigerCard = document.getElementById("tigerCard");

  dragonCard.classList.add("flip");
  tigerCard.classList.add("flip");

  setTimeout(()=>{
    dragonCard.innerText = d;
    tigerCard.innerText = t;

    let resultText = "";

    if(d > t){
      resultText = "Dragon Wins";
      wallet += bets.dragon * 2;
    } else if(t > d){
      resultText = "Tiger Wins";
      wallet += bets.tiger * 2;
    } else {
      resultText = "Tie";
      wallet += bets.dragon + bets.tiger;
    }

    document.getElementById("result").innerText = resultText;
    updateWallet();

    bets = {dragon:0, tiger:0};
    resetGame();

  },600);
}

function resetGame(){
  setTimeout(()=>{
    document.getElementById("dragonCard").innerText = "?";
    document.getElementById("tigerCard").innerText = "?";

    document.getElementById("dragonCard").classList.remove("flip");
    document.getElementById("tigerCard").classList.remove("flip");

    time = 20;
    locked = false;
  },3000);
}

setInterval(()=>{
  if(time > 0){
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 3){
      locked = true;
      document.querySelectorAll('.bet-box').forEach(b=>b.classList.add('lock'));
    }

  } else {
    document.querySelectorAll('.bet-box').forEach(b=>b.classList.remove('lock'));
    showResult();
  }
},1000);

</script></body>
</html>
