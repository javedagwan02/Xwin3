<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  padding:10px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  position:absolute;
  right:10px;
  top:10px;
  background:#111;
  padding:6px 12px;
  border-radius:10px;
}

/* TOP BANNER */
.top{
  height:150px;
  background:url('images/file_00000000fb9072088776bb496c7908c3.png') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* TABLE */
.table{
  background:url('images/27676-removebg-preview.png') center/cover;
  padding:15px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

.flip{
  width:70px;
  height:90px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}

.flip.active .flip-inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
  font-weight:bold;
  backface-visibility:hidden;
}

.front{ background:#444; }
.back{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

/* HISTORY */
.history{
  display:flex;
  overflow-x:auto;
  gap:6px;
  padding:10px;
}

.history div{
  min-width:28px;
  height:28px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BET AREA */
.tie-box{
  background:#2ecc71;
  padding:12px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

.team-box{
  margin:10px;
  border-radius:12px;
  overflow:hidden;
  background:#111;
  cursor:pointer;
}

.team-box img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.team-box div{
  padding:10px;
  font-weight:bold;
}

.pubg{ background:#1f3c88; }
.free{ background:#8e2de2; }

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
}

.chips div{
  padding:10px;
  background:#333;
  border-radius:50%;
  cursor:pointer;
}

.timer{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">PUBG & FREE FIRE</div>
<div class="wallet">₹ <span id="wallet">1000</span></div>

<div class="top">VS</div>

<div class="table">

<!-- CARDS -->
<div class="cards">
  <div class="flip" id="pFlip">
    <div class="flip-inner">
      <div class="front">?</div>
      <div class="back" id="pCard">K</div>
    </div>
  </div>

  <div class="flip" id="fFlip">
    <div class="flip-inner">
      <div class="front">?</div>
      <div class="back" id="fCard">10</div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="history" id="history"></div>

<!-- TIE -->
<div class="tie-box" onclick="placeBet('TIE')">
  Tie (8:1)
</div>

<!-- PUBG -->
<div class="team-box pubg" onclick="placeBet('PUBG')">
  <img src="images/27826-removebg-preview.png">
  <div>PUBG</div>
</div>

<!-- FREE FIRE -->
<div class="team-box free" onclick="placeBet('FREE')">
  <img src="images/27825-removebg-preview.png">
  <div>FREE FIRE</div>
</div>

<!-- CHIPS -->
<div class="chips">
  <div onclick="setAmount(10)">10</div>
  <div onclick="setAmount(50)">50</div>
  <div onclick="setAmount(100)">100</div>
  <div onclick="setAmount(500)">500</div>
</div>

<div class="timer">Time: <span id="time">20</span></div>

</div>

<script>

let wallet = localStorage.getItem("wallet") || 1000;
let betChoice = "";
let betAmount = 0;
let time = 20;

document.getElementById("wallet").innerText = wallet;

/* CHIP */
function setAmount(a){
  betAmount = a;
}

/* BET */
function placeBet(c){
  if(time<=3){
    alert("Bet Closed");
    return;
  }
  betChoice = c;
}

/* RANDOM CARD */
function randomCard(){
  let arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function result(p,f){
  let order=["A","K","Q","J","10","9"];
  if(order.indexOf(p)<order.indexOf(f)) return "PUBG";
  if(order.indexOf(p)>order.indexOf(f)) return "FREE";
  return "TIE";
}

/* GAME LOOP */
setInterval(()=>{

  time--;
  document.getElementById("time").innerText=time;

  if(time==0){

    document.getElementById("pFlip").classList.remove("active");
    document.getElementById("fFlip").classList.remove("active");

    setTimeout(()=>{

      let p=randomCard();
      let f=randomCard();

      document.getElementById("pCard").innerText=p;
      document.getElementById("fCard").innerText=f;

      document.getElementById("pFlip").classList.add("active");
      document.getElementById("fFlip").classList.add("active");

      let r=result(p,f);

      let h=document.createElement("div");
      h.innerText=r[0];
      document.getElementById("history").prepend(h);

      if(betChoice==r){
        wallet=Number(wallet)+betAmount*2;
      }else{
        wallet=Number(wallet)-betAmount;
      }

      localStorage.setItem("wallet",wallet);
      document.getElementById("wallet").innerText=wallet;

      betChoice="";

    },400);

    time=20;
  }

},1000);

</script>

</body>
</html>
