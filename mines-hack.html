<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mines Demo</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h2{margin-top:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  width:90%;
  margin:15px auto;
}

.cell{
  background:#1e293b;
  height:60px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
}

.cell.open{
  background:#00e676;
}

.cell.mine{
  background:red;
}

.controls{
  margin:15px;
}

select,button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
}

button{
  background:#00c853;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>💣 Mines Demo (AI Mode)</h2>

<div class="controls">
  Mines:
  <select id="mineCount">
    <option>3</option>
    <option>5</option>
    <option>10</option>
    <option>15</option>
  </select>

  <br>

  <button onclick="startGame()">Start</button>
  <button onclick="predict()">Predict Safe</button>
</div>

<div class="grid" id="grid"></div>

<script>
let safeTiles = [];
let current = 0;

function startGame(){

  let mines = Number(document.getElementById("mineCount").value);

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  safeTiles = [];
  current = 0;

  let totalSafe = 25 - mines;

  // generate safe tiles
  while(safeTiles.length < totalSafe){
    let r = Math.floor(Math.random()*25);
    if(!safeTiles.includes(r)){
      safeTiles.push(r);
    }
  }

  // create grid
  for(let i=0;i<25;i++){
    let div = document.createElement("div");
    div.className = "cell";
    div.innerText = "?";
    grid.appendChild(div);
  }

}

function predict(){

  let cells = document.querySelectorAll(".cell");

  if(current < safeTiles.length){

    let index = safeTiles[current];

    cells[index].classList.add("open");
    cells[index].innerText = "💎";

    current++;
  }
  else{
    alert("All safe tiles revealed");
  }

}
</script>

</body>
</html>
