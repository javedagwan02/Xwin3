<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw History – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  padding-bottom:80px;
}
.header{
  background:linear-gradient(135deg,#ff6a6a,#ff8e8e);
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.list{
  padding:15px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:14px;
}
.status{font-weight:bold}
.pending{color:#f57c00}
.approved{color:#2e7d32}
.rejected{color:#c62828}
.empty{
  text-align:center;
  margin-top:60px;
  color:#777;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">📤 Withdraw History</div>
<div class="list" id="list"></div>

<!-- 🔥 ONLY SCRIPT FIXED (FIRESTORE) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const userEmail = localStorage.getItem("userEmail");


// 🔥 TIME FORMAT FIX (ALL TYPES HANDLE)
function formatTime(t){

  if(!t) return "N/A";

  let date;

  // Firestore timestamp
  if(t.seconds){
    date = new Date(t.seconds * 1000);
  }

  // number
  else if(typeof t === "number"){
    date = new Date(t);
  }

  // string (DD/MM/YYYY FIX)
  else if(typeof t === "string"){

    // 🔥 manual split
    let parts = t.split(/[/, :]/);

    if(parts.length >= 3){
      // assume DD/MM/YYYY
      date = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0, parts[5]||0);
    }else{
      date = new Date(t);
    }
  }

  if(!date || isNaN(date)) return "N/A";

  return date.toLocaleString("en-IN"); // 🔥 Indian format
}


// 🔥 TIME VALUE FOR SORT
function getTimeValue(t){

  if(!t) return 0;

  let date;

  if(t.seconds){
    date = new Date(t.seconds * 1000);
  }
  else if(typeof t === "number"){
    date = new Date(t);
  }
  else if(typeof t === "string"){

    let parts = t.split(/[/, :]/);

    if(parts.length >= 3){
      date = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0);
    }else{
      date = new Date(t);
    }
  }

  return date && !isNaN(date) ? date.getTime() : 0;
}


// 🔥 LOAD WITHDRAW HISTORY
async function loadWithdrawHistory(){

  list.innerHTML = "<div class='empty'>Loading...</div>";

  const snap = await getDocs(
    query(collection(db,"withdraws"), where("email","==",userEmail))
  );

  if(snap.empty){
    list.innerHTML = `<div class="empty">No withdraw history found</div>`;
    return;
  }

  let withdraws = [];

  snap.forEach(doc=>{
    withdraws.push({
      id: doc.id,
      ...doc.data()
    });
  });

  // 🔥 SORT LATEST FIRST
  withdraws.sort((a,b)=>{
    return getTimeValue(b.time) - getTimeValue(a.time);
  });

  list.innerHTML = "";

  withdraws.forEach(w=>{

    const statusClass =
      w.status === "APPROVED" ? "approved" :
      w.status === "REJECTED" ? "rejected" : "pending";

    list.innerHTML += `
      <div class="card">
        <div class="row"><span>Amount</span><span>₹${w.amount}</span></div>
        <div class="row"><span>Method</span><span>${w.method || "N/A"}</span></div>
        <div class="row"><span>Order ID</span><span>${w.id}</span></div>
        <div class="row"><span>Time</span><span>${formatTime(w.time)}</span></div>
        <div class="row">
          <span>Status</span>
          <span class="status ${statusClass}">${w.status}</span>
        </div>
      </div>
    `;
  });

}


// 🔥 CALL
loadWithdrawHistory();

</script>
</body>
</html>
