<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw History – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  padding-bottom:85px;
  background:radial-gradient(circle at top,#0b4ecb,#062f88 45%,#031338);
}

.page{
  max-width:430px;
  margin:auto;
  padding:8px;
}

.top-banner{
  height:92px;
  margin:0 -8px 10px;
  background:linear-gradient(#071c64,#0b63d8);
  border-bottom:5px solid #4aa8ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.banner-title{
  width:86%;
  padding:12px 8px;
  text-align:center;
  border-radius:18px;
  background:linear-gradient(135deg,#7d5cff,#d58cff);
  border:4px solid #9be1ff;
  color:#fff141;
  font-size:24px;
  font-weight:900;
  text-shadow:2px 3px #6d1bb5;
  box-shadow:0 4px 0 #3157b8,0 0 18px #7ee6ff;
}

.list{
  padding:4px;
}

.card{
  margin-bottom:14px;
  padding:14px;
  border-radius:18px;
  background:linear-gradient(#1c74e7,#073b9a);
  border:5px solid #4ba6ff;
  box-shadow:0 6px 0 #072e78,inset 0 0 18px rgba(255,255,255,.15);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.amount{
  font-size:30px;
  font-weight:900;
  color:#ffd21f;
  text-shadow:2px 3px #9b4400;
}

.badge{
  padding:7px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:900;
  border:3px solid #fff;
}

.pending{
  background:linear-gradient(#ffd86a,#ff9f13);
  color:#8a3b00;
}

.approved{
  background:linear-gradient(#6dff5c,#11b51b);
  color:#fff;
}

.rejected{
  background:linear-gradient(#ff5555,#e60028);
  color:#fff;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:8px;
  padding:10px;
  border-radius:12px;
  background:#dcecff;
  color:#195aa2;
  border:3px solid #75cfff;
  font-size:13px;
  font-weight:900;
}

.row span:last-child{
  text-align:right;
  color:#073b9a;
  max-width:58%;
  word-break:break-word;
}

.empty{
  margin-top:80px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#dcecff;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:430px;
  margin:auto;
  background:linear-gradient(#0645b5,#06246c);
  border:4px solid #4ba6ff;
  border-bottom:none;
  border-radius:22px 22px 0 0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

.nav-btn{
  text-align:center;
  padding:9px 0;
  color:#cce7ff;
  font-size:12px;
  font-weight:bold;
}

.nav-btn div{
  font-size:24px;
}

.nav-btn.active{
  color:#ffe620;
}
</style>
</head>

<body>

<div class="page">

  <div class="top-banner">
    <div class="banner-title">📤 WITHDRAW HISTORY</div>
  </div>

  <div class="list" id="list"></div>

</div>

<div class="bottom-nav">
  <div class="nav-btn" onclick="location.href='index.html'">
    <div>🏠</div>Home
  </div>

  <div class="nav-btn active" onclick="location.href='wallet.html'">
    <div>💰</div>Wallet
  </div>

  <div class="nav-btn" onclick="location.href='promotion.html'">
    <div>🎁</div>Promotion
  </div>

  <div class="nav-btn" onclick="location.href='account.html'">
    <div>👤</div>Account
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const userEmail = localStorage.getItem("userEmail");

function formatTime(t){
  if(!t) return "N/A";

  let date;

  if(t.seconds){
    date = new Date(t.seconds * 1000);
  }
  else if(typeof t === "number"){
    date = new Date(t);
  }
  else if(typeof t === "string"){
    let parts = t.split(/[/, :]/);

    if(parts.length >= 3){
      date = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0, parts[5]||0);
    }else{
      date = new Date(t);
    }
  }

  if(!date || isNaN(date)) return "N/A";

  return date.toLocaleString("en-IN");
}

function getTimeValue(t){
  if(!t) return 0;

  let date;

  if(t.seconds){
    date = new Date(t.seconds * 1000);
  }
  else if(typeof t === "number"){
    date = new Date(t);
  }
  else if(typeof t === "string"){
    let parts = t.split(/[/, :]/);

    if(parts.length >= 3){
      date = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0);
    }else{
      date = new Date(t);
    }
  }

  return date && !isNaN(date) ? date.getTime() : 0;
}

async function loadWithdrawHistory(){

  list.innerHTML = "<div class='empty'>Loading...</div>";

  const snap = await getDocs(
    query(collection(db,"withdraws"), where("email","==",userEmail))
  );

  if(snap.empty){
    list.innerHTML = `<div class="empty">No withdraw history found</div>`;
    return;
  }

  let withdraws = [];

  snap.forEach(doc=>{
    withdraws.push({
      id: doc.id,
      ...doc.data()
    });
  });

  withdraws.sort((a,b)=>{
    return getTimeValue(b.time) - getTimeValue(a.time);
  });

  list.innerHTML = "";

  withdraws.forEach(w=>{

    const statusClass =
      w.status === "APPROVED" ? "approved" :
      w.status === "REJECTED" ? "rejected" : "pending";

    list.innerHTML += `
      <div class="card">
        <div class="card-top">
          <div class="amount">₹${w.amount}</div>
          <div class="badge ${statusClass}">${w.status || "PENDING"}</div>
        </div>

        <div class="row">
          <span>Method</span>
          <span>${w.method || "N/A"}</span>
        </div>

        <div class="row">
          <span>Order ID</span>
          <span>${w.id}</span>
        </div>

        <div class="row">
          <span>Time</span>
          <span>${formatTime(w.time)}</span>
        </div>
      </div>
    `;
  });
}

loadWithdrawHistory();
</script>

</body>
</html>
