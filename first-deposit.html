<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Deposit Bonus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  background:radial-gradient(circle at top,#168cff,#064bb5 45%,#03143f);
  min-height:100vh;
}

.header{
  width:90%;
  margin:18px auto;
  padding:15px;
  text-align:center;
  font-size:25px;
  font-weight:900;
  color:#ffe620;
  background:linear-gradient(#1d85ff,#073b9a);
  border:4px solid #62caff;
  border-radius:20px;
  box-shadow:0 6px 0 #062b78;
  text-shadow:2px 2px #000;
}

.card{
  width:92%;
  margin:15px auto;
  padding:15px;
  border-radius:20px;
  background:linear-gradient(#1d85ff,#073b9a);
  border:4px solid #62caff;
  box-shadow:0 6px 0 #062b78;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.title{
  font-size:17px;
  font-weight:900;
  color:#fff;
  text-shadow:1px 2px #06337d;
}

.bonus{
  color:#ffe620;
  font-size:20px;
  font-weight:900;
  text-shadow:2px 2px #9b4400;
}

.desc{
  font-size:13px;
  color:#dcecff;
  margin:8px 0;
  font-weight:bold;
}

.bar{
  height:13px;
  background:#dcecff;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
  border:2px solid #fff;
}

.fill{
  height:100%;
  background:linear-gradient(#6dff5c,#11b51b);
  border-radius:20px;
}

.progress-text{
  color:#ffe620;
  font-weight:900;
  font-size:14px;
}

.btn{
  border:none;
  color:#9b3b00;
  padding:9px 18px;
  border-radius:16px;
  cursor:pointer;
  background:linear-gradient(#fff36b,#ff9f13);
  font-size:14px;
  font-weight:900;
  box-shadow:0 4px 0 #b86400;
}

.claim{
  background:linear-gradient(#6dff5c,#11b51b);
  color:#fff;
  box-shadow:0 4px 0 #087c12;
}

.done{
  background:linear-gradient(#aaa,#777);
  color:#fff;
  box-shadow:0 4px 0 #555;
}

.rules{
  width:92%;
  margin:18px auto;
  padding:16px;
  border-radius:20px;
  background:#dcecff;
  color:#195aa2;
  border:4px solid #62caff;
  box-shadow:0 6px 0 #062b78;
}

.rules h3{
  margin:0 0 10px;
  color:#073b9a;
  font-size:22px;
  font-weight:900;
}

.rules p{
  font-size:14px;
  font-weight:bold;
  margin:8px 0;
}
</style>
</head>

<body>

<div class="header">🎁 First Deposit Bonus</div>

<div id="list"></div>

<div class="rules">
  <h3>📜 Activity Rules</h3>
  <p>• Only valid for first deposit</p>
  <p>• Bonus can be claimed once</p>
  <p>• Bonus requires wagering before withdrawal</p>
  <p>• Fake activity = account block</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

const plans = [
  {amount:400, bonus:48},
  {amount:1000, bonus:108},
  {amount:2000, bonus:188},
  {amount:10000, bonus:488},
  {amount:24000, bonus:1388},
  {amount:120000, bonus:5888},
  {amount:240000, bonus:8888}
];

let totalDeposit = 0;
let claimed = [];

const list = document.getElementById("list");

async function loadDeposit(){

  const userEmail = localStorage.getItem("userEmail");

  if(!userEmail){
    alert("Login required");
    return;
  }

  const userSnap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  userSnap.forEach(d=>{
    claimed = d.data().claimedBonus || [];
  });

  const snap = await getDocs(
    query(collection(db,"deposits"), where("email","==",userEmail))
  );

  totalDeposit = 0;

  snap.forEach(d=>{
    const data = d.data();
    if(data.status === "APPROVED"){
      totalDeposit += Number(data.amount);
    }
  });

  render();
}

function render(){

  list.innerHTML = "";

  plans.forEach((p,index)=>{

    let percent = Math.min((totalDeposit / p.amount)*100, 100);

    let btnText = "Deposit";
    let btnClass = "btn";
    let clickFn = () => goDeposit(p.amount);

    if(totalDeposit >= p.amount && !claimed.includes(index)){
      btnText = "Claim";
      btnClass = "btn claim";
      clickFn = () => claimBonus(index);
    }

    if(claimed.includes(index)){
      btnText = "Claimed";
      btnClass = "btn done";
      clickFn = () => {};
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="row">
        <div class="title">First Deposit ₹${p.amount}</div>
        <div class="bonus">+₹${p.bonus}</div>
      </div>

      <div class="desc">
        Deposit ₹${p.amount} and get ₹${p.bonus} bonus
      </div>

      <div class="bar">
        <div class="fill" style="width:${percent}%"></div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="progress-text">₹${Math.min(totalDeposit,p.amount)} / ₹${p.amount}</div>
        <button class="${btnClass}">${btnText}</button>
      </div>
    `;

    card.querySelector("button").onclick = clickFn;

    list.appendChild(card);
  });
}

function goDeposit(amount){
  localStorage.setItem("depositAmount", amount);
  window.location.href = "deposit.html";
}

async function claimBonus(index){

  const userEmail = localStorage.getItem("userEmail");

  const userSnap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let userId = "";
  let currentBalance = 0;
  let oldClaimed = [];

  userSnap.forEach(d=>{
    userId = d.id;
    currentBalance = d.data().balance || 0;
    oldClaimed = d.data().claimedBonus || [];
  });

  if(oldClaimed.includes(index)){
    alert("Already claimed ❌");
    return;
  }

  const plan = plans[index];

  oldClaimed.push(index);

  await updateDoc(doc(db,"users",userId),{
    balance: currentBalance + plan.bonus,
    claimedBonus: oldClaimed
  });

  alert("Bonus ₹"+plan.bonus+" added 🎉");

  loadDeposit();
}

loadDeposit();
</script>

</body>
</html>
