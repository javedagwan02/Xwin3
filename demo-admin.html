<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demo Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.create{
  background:#4caf50;
  color:#fff;
}

.fakeDep{
  background:#2196f3;
  color:#fff;
}

.fakeWith{
  background:#ff9800;
  color:#fff;
}

.stop{
  background:#f44336;
  color:#fff;
}

</style>
</head>

<body>

<div class="header">
  🤖 Demo Admin Panel
</div>

<div class="card">

  <h3>Create Demo User</h3>

  <button class="create"
  onclick="createDemoUser()">
    Create Demo User
  </button>

</div>

<div class="card">

  <h3>Fake Activity</h3>

  <button class="fakeDep"
  onclick="startFakeDeposit()">
    Start Fake Deposit
  </button>

  <button class="fakeWith"
  onclick="startFakeWithdraw()">
    Start Fake Withdraw
  </button>

  <button class="stop"
  onclick="stopFake()">
    Stop All
  </button>

</div>

<script type="module">

/* 🔥 FIREBASE IMPORTS */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* 🔥 FIREBASE CONFIG */

const app = initializeApp({

  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",

  authDomain:"colourcash-ea60e.firebaseapp.com",

  projectId:"colourcash-ea60e"

});


/* 🔥 DATABASE */

const db = getFirestore(app);


/* 🔥 AUTH */

const auth = getAuth(app);


/* 🔥 INTERVAL */

let fakeInterval;


/* =======================================================
   🔥 CREATE DEMO USER
======================================================= */

window.createDemoUser = async function(){

  try{

    let random =
    Math.floor(Math.random()*100000);

    let email =
    "demo"+random+"@demo.com";

    let demoPass =
    String(
      Math.floor(
        100000 + Math.random()*900000
      )
    );

    /* 🔥 CREATE AUTH USER */

    const userCredential =
    await createUserWithEmailAndPassword(
      auth,
      email,
      demoPass
    );

    let uid =
    userCredential.user.uid;

    /* 🔥 SAVE FIRESTORE DATA */

    await setDoc(
      doc(db,"users",uid),
      {

        email: email,

        balance:
        Math.floor(
          Math.random()*50000
        ) + 1000,

        bonusBalance: 0,

        firstDepositDone: true,

        isDemo: true,

        password: demoPass,

        timeStamp: Date.now()

      }
    );

    alert(
      "✅ Demo User Created\n\n"+
      "Email: "+email+
      "\nPassword: "+demoPass
    );

  }catch(err){

    alert(
      "❌ "+err.message
    );

  }

}


/* =======================================================
   🔥 FAKE DEPOSIT
======================================================= */

window.startFakeDeposit = function(){

  stopFake();

  fakeInterval = setInterval(
  async ()=>{

    let names = [
      "Rahul",
      "Aman",
      "Rohit",
      "Sameer",
      "Vikas"
    ];

    let name =
    names[
      Math.floor(
        Math.random()*names.length
      )
    ];

    let amount =
    Math.floor(
      Math.random()*5000
    ) + 500;

    await addDoc(
      collection(db,"deposits"),
      {

        email:
        name+"@demo.com",

        amount: amount,

        utr:
        "DEMO"+
        Math.floor(
          Math.random()*1000000
        ),

        status:"APPROVED",

        time: Date.now(),

        isDemo:true

      }
    );

    console.log(
      "Fake Deposit Added"
    );

  },5000);

}


/* =======================================================
   🔥 FAKE WITHDRAW
======================================================= */

window.startFakeWithdraw = function(){

  stopFake();

  fakeInterval = setInterval(
  async ()=>{

    let names = [
      "Ravi",
      "Sahil",
      "Arjun",
      "Karan",
      "Deepak"
    ];

    let name =
    names[
      Math.floor(
        Math.random()*names.length
      )
    ];

    let amount =
    Math.floor(
      Math.random()*4000
    ) + 300;

    await addDoc(
      collection(db,"withdraws"),
      {

        email:
        name+"@demo.com",

        amount: amount,

        status:"APPROVED",

        time: Date.now(),

        isDemo:true

      }
    );

    console.log(
      "Fake Withdraw Added"
    );

  },6000);

}


/* =======================================================
   🔥 STOP
======================================================= */

window.stopFake = function(){

  clearInterval(fakeInterval);

  alert("❌ Stopped");

}

</script>

</body>
</html>
