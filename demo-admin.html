<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manual Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  padding:0;
  background:#111;
  font-family:Arial;
  color:#fff;
}

.header{
  text-align:center;
  padding:18px;
  font-size:26px;
  font-weight:bold;
}

.card{
  background:#1d1d1d;
  margin:15px;
  padding:15px;
  border-radius:14px;
}

input,
select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.create{
  background:#2196f3;
  color:#fff;
}

.deposit{
  background:#4caf50;
  color:#fff;
}

.withdraw{
  background:#ff9800;
  color:#fff;
}

</style>
</head>

<body>

<div class="header">
🤖 Manual Admin Panel
</div>

<!-- CREATE DEMO USER -->

<div class="card">

<h3>Create Demo User</h3>

<input
type="text"
id="customEmail"
placeholder="Custom Gmail Name">

<button
class="create"
onclick="createDemoUser()">

Create Demo User

</button>

</div>

<!-- MANUAL DEPOSIT / WITHDRAW -->

<div class="card">

<h3>Manual Deposit / Withdraw</h3>

<input
type="text"
id="email"
placeholder="User Gmail">

<input
type="number"
id="amount"
placeholder="Amount">

<select id="method">

<option value="BANK">
BANK
</option>

<option value="UPI">
UPI
</option>

</select>

<input
type="datetime-local"
id="time">

<button
class="deposit"
onclick="addDeposit()">

Add Deposit

</button>

<button
class="withdraw"
onclick="addWithdraw()">

Add Withdraw

</button>

</div>

<script type="module">

/* =====================================================
   🔥 FIREBASE IMPORTS
===================================================== */

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
setDoc,
doc,
getDocs,
query,
where,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* =====================================================
   🔥 FIREBASE CONFIG
===================================================== */

const firebaseConfig = {

apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",

authDomain:"colourcash-ea60e.firebaseapp.com",

projectId:"colourcash-ea60e"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);


/* =====================================================
   🔥 GENERATE RANDOM UTR
===================================================== */

function generateUTR(){

let utr = "";

for(let i=0;i<12;i++){

utr += Math.floor(Math.random()*10);

}

return utr;

}


/* =====================================================
   🔥 GENERATE RANDOM ORDER ID
===================================================== */

function generateOrderID(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let id = "";

for(let i=0;i<20;i++){

id += chars.charAt(
Math.floor(
Math.random()*chars.length
)
);

}

return id;

}


/* =====================================================
   🔥 CREATE DEMO USER
===================================================== */

window.createDemoUser = async function(){

try{

let customName =
document.getElementById(
"customEmail"
).value.trim();

if(!customName){

alert("Enter Custom Gmail Name ❌");

return;

}

let email =
customName + "@demo.com";

let pass =
String(
Math.floor(
100000 + Math.random()*900000
)
);

/* CREATE AUTH USER */

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
pass
);

let uid =
userCredential.user.uid;

/* SAVE USER */

await setDoc(
doc(db,"users",uid),
{

uid:uid,

email:email,

balance:
Math.floor(
Math.random()*50000
)+1000,

bonusBalance:0,

firstDepositDone:true,

isDemo:true,

password:pass,

timeStamp:Date.now()

}
);

alert(
"✅ Demo User Created\n\n"+
"Email: "+email+
"\nPassword: "+pass
);

}catch(err){

alert(err.message);

}

}


/* =====================================================
   🔥 FIND USER
===================================================== */

async function findUserByEmail(email){

const q = query(
collection(db,"users"),
where("email","==",email)
);

const snap =
await getDocs(q);

if(snap.empty){

return null;

}

return snap.docs[0];

}


/* =====================================================
   🔥 ADD DEPOSIT
===================================================== */

window.addDeposit = async function(){

try{

let email =
document.getElementById(
"email"
).value.trim();

let amount =
Number(
document.getElementById(
"amount"
).value
);

let timeValue =
document.getElementById(
"time"
).value;

if(!email || !amount || !timeValue){

alert("Fill all fields ❌");

return;

}

let time =
new Date(timeValue).getTime();

/* FIND USER */

const userDoc =
await findUserByEmail(email);

if(!userDoc){

alert("User Not Found ❌");

return;

}

let userData =
userDoc.data();

/* RANDOM UTR */

let utr =
generateUTR();

/* ADD DEPOSIT */

await addDoc(
collection(db,"deposits"),
{

uid:userDoc.id,

email:email,

amount:amount,

utr:utr,

orderId:"N/A",

status:"APPROVED",

time:time,

isManual:true

}
);

/* UPDATE BALANCE */

await updateDoc(
doc(db,"users",userDoc.id),
{

balance:
(userData.balance || 0)
+ amount

}
);

alert(
"✅ Deposit Added\n\n"+
"UTR: "+utr
);

}catch(err){

alert(err.message);

}

}


/* =====================================================
   🔥 ADD WITHDRAW
===================================================== */

window.addWithdraw = async function(){

try{

let email =
document.getElementById(
"email"
).value.trim();

let amount =
Number(
document.getElementById(
"amount"
).value
);

let method =
document.getElementById(
"method"
).value;

let timeValue =
document.getElementById(
"time"
).value;

if(!email || !amount || !timeValue){

alert("Fill all fields ❌");

return;

}

let time =
new Date(timeValue).getTime();

/* FIND USER */

const userDoc =
await findUserByEmail(email);

if(!userDoc){

alert("User Not Found ❌");

return;

}

let userData =
userDoc.data();

/* CHECK BALANCE */

if(
(userData.balance || 0)
< amount
){

alert("Insufficient Balance ❌");

return;

}

/* ORDER ID */

let orderId =
generateOrderID();

/* ADD WITHDRAW */

await addDoc(
collection(db,"withdraws"),
{

uid:userDoc.id,

email:email,

amount:amount,

method:method,

orderId:orderId,

status:"APPROVED",

time:time,

isManual:true

}
);

/* UPDATE BALANCE */

await updateDoc(
doc(db,"users",userDoc.id),
{

balance:
(userData.balance || 0)
- amount

}
);

alert(
"✅ Withdraw Added\n\n"+
"Order ID: "+orderId
);

}catch(err){

alert(err.message);

}

}

</script>

</body>
</html>
