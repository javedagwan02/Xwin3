<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demo Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
}

.create{background:#4caf50;color:#fff;}
.fakeDep{background:#2196f3;color:#fff;}
.fakeWith{background:#ff9800;color:#fff;}
.stop{background:#f44336;color:#fff;}
</style>
</head>

<body>

<div class="header">🤖 Demo Admin Panel</div>

<div class="card">
  <h3>Create Demo User</h3>
  <button class="create" onclick="createDemoUser()">Create Demo User</button>
</div>

<div class="card">
  <h3>Fake Activity</h3>
  <button class="fakeDep" onclick="startFakeDeposit()">Start Fake Deposit</button>
  <button class="fakeWith" onclick="startFakeWithdraw()">Start Fake Withdraw</button>
  <button class="stop" onclick="stopFake()">Stop All</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

let fakeInterval;

/* 🔥 CREATE DEMO USER */
window.createDemoUser = async function(){

  let id = "demo_" + Date.now();

  let demoPass = Math.floor(100000 + Math.random()*900000); // 🔥 password

  await setDoc(doc(db,"users",id),{
    email: "demo"+Math.floor(Math.random()*1000)+"@demo.com",
    balance: Math.floor(Math.random()*50000)+1000,
    bonusBalance: 0,
    firstDepositDone: true,
    isDemo: true,

    password: demoPass, // 🔥 ADD THIS

    timeStamp: Date.now()
  });

  alert("Demo User Created ✅\nPassword: " + demoPass);
}

/* 🔥 FAKE DEPOSIT */
window.startFakeDeposit = function(){

  stopFake();

  fakeInterval = setInterval(async ()=>{

    let names = ["Rahul","Aman","Rohit","Sameer","Vikas"];
    let name = names[Math.floor(Math.random()*names.length)];

    let amount = Math.floor(Math.random()*5000)+500;

    await addDoc(collection(db,"deposits"),{
      email: name+"@demo.com",
      amount: amount,
      utr: "DEMO"+Math.floor(Math.random()*1000000),
      status: "APPROVED",
      time: Date.now(),
      isDemo: true
    });

    console.log("Fake Deposit Added");

  },5000);
}

/* 🔥 FAKE WITHDRAW */
window.startFakeWithdraw = function(){

  stopFake();

  fakeInterval = setInterval(async ()=>{

    let names = ["Ravi","Sahil","Arjun","Karan","Deepak"];
    let name = names[Math.floor(Math.random()*names.length)];

    let amount = Math.floor(Math.random()*4000)+300;

    await addDoc(collection(db,"withdraws"),{
      email: name+"@demo.com",
      amount: amount,
      status: "APPROVED",
      time: Date.now(),
      isDemo: true
    });

    console.log("Fake Withdraw Added");

  },6000);
}

/* 🔥 STOP */
window.stopFake = function(){
  clearInterval(fakeInterval);
  alert("Stopped ❌");
}

</script>

</body>
</html>
