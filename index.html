async function loadBalance(){  
  
  const userEmail = localStorage.getItem("userEmail");  
  
  if(!userEmail){  
    console.log("User not logged in");  
    return;  
  }  
  
  const userSnap = await getDocs(  
    query(collection(db,"users"), where("email","==",userEmail))  
  );  
  
  userSnap.forEach(d=>{  
    let balance = Number(d.data().balance || 0);  
  
    document.getElementById("topBalance").innerText =  
Number(balance).toLocaleString(undefined, {  
  minimumFractionDigits: 2,  
  maximumFractionDigits: 2  
});  
    localStorage.setItem("wallet", balance);  
  });  
}

async function openJiliGame(gameId){

  try{

    const userEmail = localStorage.getItem("userEmail");

    if(!userEmail){
      alert("Login required");
      return;
    }

    // balance check same as before...

    document.body.style.opacity = "0.7";

    const res = await fetch(
      "https://jili-backend.onrender.com/api/game/launch",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          uid: userEmail,
          game_uid: gameId,
          home_url: window.location.origin,
          platform: 1,
          language: "en"
        })
      }
    );

    const data = await res.json();

    document.body.style.opacity = "1";

    if(!data.success){
      alert(data.msg || "Game launch failed");
      return;
    }

    window.location.href = data.game_url;

  }catch(e){
    console.log(e);
    alert("Server Error");
    document.body.style.opacity = "1";
  }
}

// 🔥 RANDOM TIME (REALISTIC)  
function randomTime(){  
  let h = Math.floor(Math.random() * 12) + 1;  
  let m = Math.floor(Math.random() * 60);  
  let ampm = Math.random() > 0.5 ? "AM" : "PM";  
  
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;  
}  
  
// 🔥 RANDOM WITHDRAW AMOUNT  
function randomWithdraw(){  
  
  let chance = Math.random();  
  
  if(chance < 0.7){  
    // 🔥 small wins  
    return Math.floor(1000 + Math.random() * 20000);  
  }else{  
    // 💰 medium wins  
    return Math.floor(20000 + Math.random() * 80000);  
  }  
  
}  
// 🔥 LIVE LEADERBOARD  
function startLeaderboard(){  
  
  const box = document.getElementById("withdrawList");  
  if(!box) return;  
  
  setInterval(()=>{  
  
    let amount = randomWithdraw();  
    let time = randomTime();  
  
    let item = document.createElement("div");  
  
    item.innerText = "₹" + amount.toLocaleString() + " • " + time;  
  
    box.prepend(item);  
  
    // 🔥 only 3 entries visible  
    if(box.children.length > 3){  
      box.removeChild(box.lastChild);  
    }  
  
  }, 1200);  
  
}  
  
// 🔥 RUN AFTER PAGE LOAD  
window.onload = () => {  
  startLeaderboard();  
};
