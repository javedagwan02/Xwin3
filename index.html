window.openGame = async function(url){

const userEmail = localStorage.getItem("userEmail");

// 🔥 BLOCK CHECK
const userSnap = await getDocs(
  query(collection(db,"users"), where("email","==",userEmail))
);

let isBlocked = false;

userSnap.forEach(d=>{
  isBlocked = d.data().blocked || false;
});

if(isBlocked){
  document.getElementById("blockPopup").style.display = "flex";
  return;
}

// 🔥 GAME STATUS CHECK
const gameName = url.replace(".html","");
const ref = doc(db,"gameStatus",gameName);
const snap = await getDoc(ref);

if(snap.exists() && snap.data().active === false){
  location.href = "coming-soon.html";
  return;
}

// 🔥 DEPOSIT CHECK
let hasDeposited = false;

userSnap.forEach(d=>{
  hasDeposited = d.data().hasDeposited === true;
});

if(!hasDeposited){
  document.getElementById("depositPopup").style.display="flex";
}else{
  location.href = url;
}

}
</script>

if(wallet - startBalance >= 100){
return true;

/* FORCE LOSS AFTER +100 */

if(profitBlocked()){

}

return originalRandom();

let currentSlide = 0;
const track = document.getElementById("bannerTrack");
const slides = document.querySelectorAll("#bannerTrack img");
const totalSlides = slides.length;

function updateSlide(){
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
}

// 🔥 AUTO SLIDE (2 sec)
setInterval(()=>{
  currentSlide++;
  if(currentSlide >= totalSlides){
    currentSlide = 0;
  }
  updateSlide();
},2000);

// 👉 TOUCH SLIDE (manual mobile swipe)
let startX = 0;

track.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    // swipe left
    currentSlide++;
  }else if(endX - startX > 50){
    // swipe right
    currentSlide--;
  }

  if(currentSlide < 0) currentSlide = totalSlides - 1;
  if(currentSlide >= totalSlides) currentSlide = 0;

  updateSlide();
});
