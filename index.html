let currentSlide = 0;  
const track = document.getElementById("bannerTrack");  
const slides = document.querySelectorAll("#bannerTrack img");  
const totalSlides = slides.length;  
  
function updateSlide(){  
  track.style.transform = `translateX(-${currentSlide * 100}%)`;  
}  
  
  
  
// 👉 TOUCH SLIDE (manual mobile swipe)  
let startX = 0;  
  
track.addEventListener("touchstart",(e)=>{  
  startX = e.touches[0].clientX;  
});  
  
track.addEventListener("touchend",(e)=>{  
  let endX = e.changedTouches[0].clientX;  
  
  if(startX - endX > 50){  
    // swipe left  
    currentSlide++;  
  }else if(endX - startX > 50){  
    // swipe right  
    currentSlide--;  
  }  
  
  if(currentSlide < 0) currentSlide = totalSlides - 1;  
  if(currentSlide >= totalSlides) currentSlide = 0;  
  
  updateSlide();  
});

// 🔥 RANDOM TIME (REALISTIC)  
function randomTime(){  
  let h = Math.floor(Math.random() * 12) + 1;  
  let m = Math.floor(Math.random() * 60);  
  let ampm = Math.random() > 0.5 ? "AM" : "PM";  
  
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;  
}  
  
// 🔥 RANDOM WITHDRAW AMOUNT  
function randomWithdraw(){  
  
  let chance = Math.random();  
  
  if(chance < 0.7){  
    // 🔥 small wins  
    return Math.floor(1000 + Math.random() * 20000);  
  }else{  
    // 💰 medium wins  
    return Math.floor(20000 + Math.random() * 80000);  
  }  
  
}  
// 🔥 LIVE LEADERBOARD  
function startLeaderboard(){  
  
  const box = document.getElementById("withdrawList");  
  if(!box) return;  
  
  setInterval(()=>{  
  
    let amount = randomWithdraw();  
    let time = randomTime();  
  
    let item = document.createElement("div");  
  
    item.innerText = "₹" + amount.toLocaleString() + " • " + time;  
  
    box.prepend(item);  
  
    // 🔥 only 3 entries visible  
    if(box.children.length > 3){  
      box.removeChild(box.lastChild);  
    }  
  
  }, 1200);  
  
}  
  
// 🔥 RUN AFTER PAGE LOAD  
window.onload = () => {  
  startLeaderboard();  
};
