<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("images/file_000000008f787208b840aa1446e72c62.png") no-repeat center;
  background-size:cover;
  color:#fff;
}

/* 🔥 MAIN CARD */
.container{
  max-width:360px;
  margin:70px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);

  box-shadow:
    0 0 20px rgba(255,165,0,0.4),
    inset 0 0 15px rgba(255,140,0,0.4);

  border:2px solid rgba(255,165,0,0.5);
}

/* 🔥 LOGO */
.logo{
  width:180px;
  margin-bottom:10px;
}

/* 🔥 TITLE */
.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
  color:#ffcc00;
}

.subtitle{
  font-size:14px;
  opacity:0.8;
  margin-bottom:15px;
}

/* 🔥 INPUT BOX */
.input-box{
  display:flex;
  align-items:center;
  background: rgba(0,0,0,0.6);
  border:1px solid rgba(255,165,0,0.5);
  border-radius:12px;
  padding:10px;
  margin-top:12px;
}

.input-box span{
  margin-right:8px;
  font-size:18px;
}

.input-box input{
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  width:100%;
  font-size:15px;
}

/* 🔥 BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:12px;

  background: linear-gradient(90deg,#ff3b00,#ff8c00);
  color:#fff;
  font-size:16px;
  font-weight:bold;

  box-shadow:0 0 15px rgba(255,100,0,0.7);
}

/* 🔗 LINKS */
a{
  color:#ffcc00;
  font-weight:bold;
  text-decoration:none;
}

.link{
  margin-top:12px;
  font-size:14px;
}

/* 🔒 FOOTER */
.footer{
  margin-top:14px;
  font-size:12px;
  opacity:0.7;
}
  /* 🔥 POPUP FIX */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:rgba(0,0,0,0.7);

  display:none;
  align-items:center;
  justify-content:center;

  z-index:9999;
}

.popup div{
  background:#111;
  padding:20px 30px;
  border-radius:12px;
  font-size:16px;
  text-align:center;

  box-shadow:0 0 15px rgba(0,255,100,0.5);
}
</style>
</head>

<body>

<div class="container">

  <img src="images/IMG_20260327_085519.png" class="logo">

  <div class="title">REGISTER NOW</div>
  <div class="subtitle">Join the Ultimate Casino Experience!</div>

  <div class="input-box">
    <span>📧</span>
    <input type="email" id="email" placeholder="Enter your Email">
  </div>

  <div class="input-box">
    <span>🔒</span>
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <div class="input-box">
    <span>🔐</span>
    <input type="password" id="confirm" placeholder="Confirm Password">
  </div>

<button id="signupBtn">SIGN UP</button>
  
  <div class="link">
    Already have an account? <a href="login.html">Login Here</a>
  </div>

  <div class="link" onclick="openSupport()" style="cursor:pointer;">
    Forgot Password?
  </div>

  <div class="footer">
    🔒 100% Secure | SSL Encrypted | 18+
  </div>
  
</div>

  <div class="popup" id="popup">
  <div id="popupText"></div>
  </div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 POPUP */
function showPopup(msg){
  let popup = document.getElementById("popup");
  let text = document.getElementById("popupText");

  text.innerText = msg;
  popup.style.display = "flex";

  setTimeout(()=> popup.style.display="none",1000);
}

/* 🔥 REGISTER FUNCTION */
async function register(){

  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  if(!email || !pass || !confirm){
    showPopup("Fill all fields");
    return;
  }

  if(pass !== confirm){
    showPopup("Passwords do not match");
    return;
  }

  try{
    const result = await createUserWithEmailAndPassword(auth, email, pass);
    const user = result.user;

    /* 🔹 LOCAL STORAGE */
    localStorage.setItem("userEmail", user.email);
    localStorage.setItem("userName", user.email.split("@")[0]);
    localStorage.setItem("lastLogin", new Date().toLocaleString());

    /* 🔹 LOCAL USERS */
    let users = JSON.parse(localStorage.getItem("users")) || [];
    if(!users.find(u => u.email === user.email)){
      users.push({ email: user.email, balance: 0 });
    }
    localStorage.setItem("users", JSON.stringify(users));

    /* 🔥 REF SYSTEM */
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get("ref");

    /* 🔥 USERNAME */
    const username =
      user.email.split("@")[0] +
      Math.floor(1000 + Math.random() * 9000);

    /* 🔥 FIRESTORE SAVE */
    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      username: username,
      balance: 30,
      signupBonus: true,
      role: "user",
      timeStamp: Date.now(),
      referredBy: ref || null
    });

    showPopup("Registration Successful 🎉");

    localStorage.setItem("newUser","true");

    setTimeout(()=>{
      window.location.href = "index.html";
    },1500);

  }catch(err){
    showPopup(err.message);
  }
}

/* 🔥 BUTTON EVENT (IMPORTANT FIX) */
document.getElementById("signupBtn")
  .addEventListener("click", register);

/* 🔥 SUPPORT */
window.openSupport = () => {
  window.open("https://t.me/X2xwinxsupportk", "_blank");
};

</script>

</body>
</html>
