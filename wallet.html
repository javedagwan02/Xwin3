<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallet – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  padding-bottom:90px;
  background:radial-gradient(circle at top,#0b4ecb,#062f88 45%,#031338);
}

.page{
  max-width:430px;
  margin:auto;
  padding:8px;
}

.top-banner{
  height:92px;
  margin:0 -8px 10px;
  background:linear-gradient(#071c64,#0b63d8);
  border-bottom:5px solid #4aa8ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.banner-title{
  width:78%;
  padding:12px;
  text-align:center;
  border-radius:18px;
  background:linear-gradient(135deg,#7d5cff,#d58cff);
  border:4px solid #9be1ff;
  color:#fff141;
  font-size:30px;
  font-weight:900;
  text-shadow:2px 3px #6d1bb5;
  box-shadow:0 4px 0 #3157b8,0 0 18px #7ee6ff;
}

.card{
  border-radius:18px;
  background:linear-gradient(#1c74e7,#073b9a);
  border:5px solid #4ba6ff;
  box-shadow:0 5px 0 #072e78,inset 0 0 20px rgba(255,255,255,.15);
  padding:14px;
  margin-bottom:14px;
}

.wallet-card{
  text-align:center;
}

.wallet-title{
  font-size:22px;
  font-weight:900;
  text-shadow:2px 2px #06337d;
}

.wallet-card h1{
  margin:8px 0;
  font-size:50px;
  font-weight:900;
  color:#ffd21f;
  text-shadow:3px 4px #9b4400;
}

.bonus-pill{
  display:inline-block;
  padding:8px 18px;
  border-radius:28px;
  background:linear-gradient(#7d5cff,#5322be);
  border:3px solid #6cd9ff;
  font-size:18px;
  font-weight:900;
}

.bonus-pill span{
  color:#ffe620;
}

.stats{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.stat{
  padding:12px;
  border-radius:14px;
  background:#dcecff;
  color:#195aa2;
  border:4px solid #4ba6ff;
  font-weight:900;
}

.stat h3{
  margin:0;
  color:#ff9f13;
  font-size:24px;
  text-shadow:1px 1px #8a3b00;
}

.stat span{
  font-size:13px;
}

.actions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.action{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#fff;
  cursor:pointer;
  text-shadow:1px 2px #06337d;
}

.action div{
  width:58px;
  height:58px;
  margin:auto;
  margin-bottom:6px;
  border-radius:50%;
  background:linear-gradient(#5fd6ff,#0c59d9);
  border:4px solid #65c9ff;
  box-shadow:0 4px 0 #06337d;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:27px;
}

.section-title{
  font-size:22px;
  font-weight:900;
  text-shadow:2px 2px #06337d;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  color:#174d91;
  background:#dce8ff;
}

.send-btn{
  width:100%;
  padding:16px;
  margin-top:14px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:900;
  color:#9b3b00;
  background:linear-gradient(#fff06a,#ff9f13);
  box-shadow:0 5px 0 #b86400;
}

.rules{
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  background:#dcecff;
  color:#195aa2;
  font-size:14px;
  font-weight:bold;
  line-height:1.7;
  border:4px solid #4ba6ff;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:430px;
  margin:auto;
  background:linear-gradient(#0645b5,#06246c);
  border:4px solid #4ba6ff;
  border-bottom:none;
  border-radius:22px 22px 0 0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

.nav-btn{
  text-align:center;
  padding:9px 0;
  color:#cce7ff;
  font-size:12px;
  font-weight:bold;
}

.nav-btn div{
  font-size:24px;
}

.nav-btn.active{
  color:#ffe620;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-box{
  width:85%;
  max-width:320px;
  padding:22px;
  border-radius:18px;
  text-align:center;
  background:linear-gradient(#1c74e7,#073b9a);
  border:5px solid #4ba6ff;
  color:white;
  box-shadow:0 0 25px rgba(0,150,255,.6);
}

.popup-box button{
  width:100%;
  padding:12px;
  margin-top:14px;
  border:none;
  border-radius:12px;
  background:#18c757;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="page">

  <div class="top-banner">
    <div class="banner-title">WALLET</div>
  </div>

  <div class="card wallet-card">
    <div class="wallet-title">Total Balance</div>

    <h1>₹<span id="balance">0.00</span></h1>

    <div class="bonus-pill">
      🎁 Bonus: ₹<span id="bonusBalance">0.00</span>
    </div>

    <div class="stats">
      <div class="stat">
        <h3 id="withdrawTotal">0</h3>
        <span>Total Withdraw</span>
      </div>

      <div class="stat">
        <h3 id="depositTotal">0</h3>
        <span>Total Deposit</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="actions">
      <div class="action" onclick="location.href='deposit.html'">
        <div>💰</div>
        Deposit
      </div>

      <div class="action" onclick="location.href='withdraw.html'">
        <div>🏦</div>
        Withdraw
      </div>

      <div class="action" onclick="location.href='deposit-history.html'">
        <div>📥</div>
        Deposit History
      </div>

      <div class="action" onclick="location.href='withdraw-history.html'">
        <div>📤</div>
        Withdraw History
      </div>
    </div>
  </div>

  <div class="card">

    <div class="section-title">💸 Transfer Money</div>

    <input type="email" id="receiverEmail" placeholder="Enter Friend Email">

    <input type="number" id="transferAmount" placeholder="Enter Amount">

    <button onclick="sendMoney()" class="send-btn">
      Send Money
    </button>

    <div class="rules">
      ⚠️ Transfer Fees:<br><br>
      • ₹1 – ₹100 → 23% fee<br>
      • ₹100 – ₹10,000 → 18% fee<br>
      • ₹10,000 – ₹50,000 → 12% fee
    </div>

  </div>

</div>

<div id="customPopup" class="popup">
  <div class="popup-box">
    <div style="font-size:34px;">✅</div>
    <div id="popupMsg" style="margin-top:10px;font-size:17px;font-weight:bold;"></div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-btn" onclick="location.href='index.html'">
    <div>🏠</div>Home
  </div>

  <div class="nav-btn active">
    <div>💰</div>Wallet
  </div>

  <div class="nav-btn" onclick="location.href='promotion.html'">
    <div>🎁</div>Promotion
  </div>

  <div class="nav-btn" onclick="location.href='account.html'">
    <div>👤</div>Account
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userEmail = localStorage.getItem("userEmail");

let balance = 0;

async function loadWallet(){

  let totalDeposit = 0;
  let totalWithdraw = 0;
  let bonus = 0;
  let firstDepositDone = false;

  const userSnap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  userSnap.forEach(d=>{
    balance = d.data().balance || 0;
    bonus = d.data().bonusBalance || 0;
    firstDepositDone = d.data().firstDepositDone || false;
  });

  localStorage.setItem("firstDepositDone", firstDepositDone);
  localStorage.setItem("wallet", balance);
  localStorage.setItem("coin_wallet", balance);
  localStorage.setItem("walletUpdated", "1");

  const depSnap = await getDocs(
    query(collection(db,"deposits"), where("email","==",userEmail))
  );

  depSnap.forEach(d=>{
    const x = d.data();
    if(x.status === "APPROVED"){
      totalDeposit += Number(x.amount);
    }
  });

  localStorage.setItem("totalDeposit", totalDeposit);

  const wdSnap = await getDocs(
    query(collection(db,"withdraws"), where("email","==",userEmail))
  );

  wdSnap.forEach(d=>{
    const w = d.data();
    if(w.status === "APPROVED"){
      totalWithdraw += Number(w.amount);
    }
  });

  document.getElementById("balance").innerText = Number(balance).toFixed(2);
  document.getElementById("depositTotal").innerText = totalDeposit;
  document.getElementById("withdrawTotal").innerText = totalWithdraw;
  document.getElementById("bonusBalance").innerText = Number(bonus).toFixed(2);
}

loadWallet();

window.sendMoney = async function(){

  let receiver = document.getElementById("receiverEmail").value.trim();
  let amount = Number(document.getElementById("transferAmount").value);

  if(!receiver || amount <= 0){
    showPopup("Enter valid details");
    return;
  }

  if(amount > Number(balance)){
    showPopup("Insufficient balance");
    return;
  }

  let feePercent = 0;

  if(amount >= 1 && amount <= 100){
    feePercent = 23;
  }
  else if(amount <= 10000){
    feePercent = 18;
  }
  else if(amount <= 50000){
    feePercent = 12;
  }
  else{
    showPopup("Max transfer limit ₹50,000");
    return;
  }

  let fee = (amount * feePercent) / 100;
  let finalAmount = amount - fee;

  const userSnap = await getDocs(
    query(collection(db,"users"), where("email","==",receiver))
  );

  if(userSnap.empty){
    showPopup("User not found");
    return;
  }

  let receiverId = "";
  let receiverBalance = 0;
  let receiverWager = 0;

  userSnap.forEach(d=>{
    receiverId = d.id;
    receiverBalance = d.data().balance || 0;
    receiverWager = d.data().wagerRequired || 0;
  });

  const senderSnap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let senderId = "";

  senderSnap.forEach(d=>{
    senderId = d.id;
  });

  let newSenderBalance = balance - amount;

  await updateDoc(doc(db,"users",senderId),{
    balance: newSenderBalance
  });

  balance = newSenderBalance;

  let wagerAdd = finalAmount * 0.5;

  await updateDoc(doc(db,"users",receiverId),{
    balance: receiverBalance + finalAmount,
    wagerRequired: (receiverWager || 0) + wagerAdd
  });

  showPopup(`Sent ₹${finalAmount.toFixed(2)} (Fee ₹${fee.toFixed(2)}) 💸`);

  setTimeout(()=>{
    location.reload();
  },1200);
}

window.showPopup = function(msg){
  document.getElementById("popupMsg").innerText = msg;
  document.getElementById("customPopup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("customPopup").style.display = "none";
}
</script>

</body>
</html>
