<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💥 Tower Crash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b1a;
  color:#fff;
  text-align:center;
}

.header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  background:#111;
  display:inline-block;
  padding:6px 16px;
  border-radius:20px;
  margin-top:6px;
}

.tower{
  display:flex;
  flex-direction:column-reverse;
  align-items:center;
  margin:20px;
  gap:10px;
}

.row{
  display:flex;
  gap:10px;
}

.box{
  width:70px;
  height:70px;
  background:#1c1c2e;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:0.3s;
}

.box:hover{
  transform:scale(1.1);
}

.safe{ background:#2ecc71; }
.crash{ background:#e74c3c; }

.controls{
  margin:20px;
}

input{
  width:80%;
  padding:12px;
  border-radius:20px;
  border:none;
  margin-bottom:10px;
}

button{
  width:80%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#ff4fd8;
  font-size:16px;
  font-weight:bold;
  margin:6px;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup div{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:16px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">
💥 TOWER CRASH
<div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<div id="tower" class="tower"></div>

<div class="controls">
<input id="bet" type="number" value="100">
<button onclick="startGame()">START</button>
<button onclick="cashout()">CASHOUT</button>
</div>

<div class="popup" id="popup"><div id="popupText"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,collection,query,where,
  getDocs,doc,getDoc,onSnapshot,updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

const email = localStorage.getItem("userEmail");

/* STATE */
let wallet = 0;
let uid = "";
let level = 0;
let bet = 0;
let running = false;
let HOUSE_EDGE = 0.5;

const multipliers = [1.2,1.5,2,3,5,8,13,20];

/* LOAD WALLET */
async function loadWallet(){
  const q=query(collection(db,"users"),where("email","==",email));
  const snap=await getDocs(q);

  snap.forEach(d=>{
    uid=d.id;
    wallet=d.data().balance || 0;
  });

  updateWallet();
}

/* LIVE HOUSE EDGE 🔥 */
onSnapshot(doc(db,"settings","houseEdge"), (snap)=>{
  if(snap.exists()){
    HOUSE_EDGE = snap.data().towerCrash ?? 0.5;
  }
});

/* SAVE WALLET */
async function saveWallet(){
  if(uid){
    await updateDoc(doc(db,"users",uid),{balance:wallet});
  }
}

/* UI */
function updateWallet(){
  document.getElementById("wallet").innerText = wallet;
}

function popup(msg){
  popupText.innerText = msg;
  popup.style.display="flex";
  setTimeout(()=>popup.style.display="none",1500);
}

/* GAME START */
window.startGame = async ()=>{
  if(running) return;

  bet = Number(document.getElementById("bet").value);

  if(bet <= 0 || bet > wallet){
    popup("Low Balance");
    return;
  }

  wallet -= bet;
  await saveWallet();
  updateWallet();

  level = 0;
  running = true;

  buildTower();
};

/* BUILD TOWER */
function buildTower(){
  const tower = document.getElementById("tower");
  tower.innerHTML = "";

  for(let i=0;i<8;i++){
    const row = document.createElement("div");
    row.className="row";

    for(let j=0;j<3;j++){
      const box = document.createElement("div");
      box.className="box";
      box.innerText="❓";

      if(i===level){
        box.onclick=()=>choose(j);
      }

      row.appendChild(box);
    }

    tower.appendChild(row);
  }
}

/* CHOOSE BOX */
function choose(index){
  if(!running) return;

  const safe = Math.random() < HOUSE_EDGE;
  const correct = Math.floor(Math.random()*3);

  const rows = document.querySelectorAll(".row");
  const currentRow = rows[level].children;

  if(index === correct && safe){
    currentRow[index].classList.add("safe");
    level++;

    if(level >= multipliers.length){
      win();
      return;
    }

    setTimeout(buildTower,500);

  } else {
    currentRow[index].classList.add("crash");
    crash();
  }
}

/* CASHOUT */
window.cashout = async ()=>{
  if(!running) return;

  let winAmount = bet * multipliers[level];

  wallet += winAmount;
  await saveWallet();
  updateWallet();

  popup("💰 CASHOUT ₹"+Math.floor(winAmount));
  running = false;
};

/* WIN */
function win(){
  let winAmount = bet * multipliers[level-1];

  wallet += winAmount;
  saveWallet();
  updateWallet();

  popup("🏆 BIG WIN ₹"+Math.floor(winAmount));
  running = false;
}

/* CRASH */
function crash(){
  popup("💥 CRASH!");
  running = false;
}

/* INIT */
await loadWallet();
</script>

</body>
</html>
