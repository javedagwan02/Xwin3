<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wager Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#ff5f5f;
}

.container{
  padding:15px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
  font-size:14px;
}

input{
  width:90px;
  padding:8px;
  border:none;
  border-radius:8px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#4caf50;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🎯 Wager Control Panel</div>

<div class="container" id="usersBox"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

const usersBox = document.getElementById("usersBox");

/* 🔥 LOAD USERS */
async function loadUsers(){
  usersBox.innerHTML = "";

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();

    usersBox.innerHTML += `
    <div class="card">
      
      <div class="row">
        <span>${u.email}</span>
        <span>₹${u.balance || 0}</span>
      </div>

      <div class="row">
        <span>Wager</span>
        <span>${u.wagerDone || 0} / ${u.wagerRequired || 0}</span>
      </div>

      <div class="row">
        <input id="wager-${d.id}" type="number" placeholder="Amount">
        <button onclick="setWager('${d.id}')">SET</button>
      </div>

      <div class="row">
        <button onclick="addWager('${d.id}')">+ ADD</button>
        <button onclick="resetWager('${d.id}')">RESET</button>
      </div>

    </div>`;
  });
}

/* 🔥 SET EXACT WAGER */
window.setWager = async(id)=>{
  const val = Number(document.getElementById("wager-"+id).value);
  if(!val) return alert("Enter amount");

  await updateDoc(doc(db,"users",id),{
    wagerRequired: val
  });

  alert("Wager Set ✅");
  loadUsers();
};

/* 🔥 ADD WAGER */
window.addWager = async(id)=>{
  const val = Number(document.getElementById("wager-"+id).value);
  if(!val) return alert("Enter amount");

  const ref = doc(db,"users",id);
  const snap = await getDoc(ref);

  const current = snap.data().wagerRequired || 0;

  await updateDoc(ref,{
    wagerRequired: current + val
  });

  alert("Wager Increased 🔥");
  loadUsers();
};

/* 🔥 RESET */
window.resetWager = async(id)=>{
  await updateDoc(doc(db,"users",id),{
    wagerDone: 0,
    wagerRequired: 0
  });

  alert("Reset Done");
  loadUsers();
};

/* INIT */
loadUsers();

</script>

</body>
</html>
