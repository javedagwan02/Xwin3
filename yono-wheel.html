<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center;
  background-size:cover;
  color:#fff;
  text-align:center;
  overflow-x:hidden;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

/* ===== SELECT BOX ===== */
.box-wrapper{
  position:relative;
  width:90%;
  margin:15px auto;
}

.box-img{
  width:100%;
  display:block;
}

/* invisible click */
.box{
  position:absolute;
  top:0;
  height:100%;
  width:33.33%;
  cursor:pointer;
}
.box1{left:0;}
.box2{left:33.33%;}
.box3{left:66.66%;}

/* glow highlight */
.glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.2);
  box-shadow:0 0 20px #00ff88;
  transition:0.3s;
  pointer-events:none;
}


  /* WHEEL SECTION */
.wheel-section{
  margin-top:20px;
  text-align:center;
}

/* POINTER */
.pointer{
  font-size:32px;
  margin-bottom:-15px;
}

/* BOX */
.wheel-box{
  width:280px;
  margin:0 auto;
  position:relative;
}

/* WHEEL IMAGE */
.wheel{
  width:100%;
  transition:4s ease-out;
  transform:rotate(0deg);
}

/* TEXT */
.info{
  margin-top:15px;
  font-size:16px;
}

/* BUTTON */
.spin-btn{
  margin-top:12px;
  background:#00e676;
  color:#000;
  padding:12px 30px;
  border-radius:30px;
  font-weight:bold;
  display:inline-block;
}
</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<!-- SELECT -->
<div class="box-wrapper">
  <img src="images/41393-removebg-preview.png" class="box-img">

  <div class="box box1" onclick="selectBox(1)"></div>
  <div class="box box2" onclick="selectBox(2)"></div>
  <div class="box box3" onclick="selectBox(3)"></div>

  <div id="glow" class="glow" style="left:2%;"></div>
</div>

<!-- WHEEL -->
<div class="wheel-section">

  <!-- POINTER -->
  <div class="pointer">⬇️</div>

  <!-- WHEEL -->
  <div class="wheel-box">
    <img id="wheel" src="images/41422-removebg-preview.png" class="wheel">
  </div>

  <!-- TEXT -->
  <div id="infoText" class="info">
    Deposit ₹100 to get 1 spin
  </div>

  <!-- BUTTON -->
  <div class="spin-btn" onclick="spin()">SPIN</div>

</div>
<script>

let rotation = 0;
let current = 1;

/* ===== SELECT WHEEL (100 / 500 / 1000) ===== */
function selectWheel(type){

  current = type;

  let wheel = document.getElementById("wheel");
  let infoText = document.getElementById("infoText");

  if(type==1){
    wheel.src="images/41422-removebg-preview.png";
    infoText.innerText="Deposit ₹100 to get 1 spin";
  }

  if(type==2){
    wheel.src="images/41433-removebg-preview.png";
    infoText.innerText="Deposit ₹500 to get 1 spin";
  }

  if(type==3){
    wheel.src="images/41464-removebg-preview.png";
    infoText.innerText="Deposit ₹1000 to get 1 spin";
  }

}


/* ===== SPIN FUNCTION ===== */
function spin(){

  let wheel = document.getElementById("wheel");

  let rand = Math.floor(Math.random()*8);   // 8 sections
  let deg = 360*5 + (rand * 45);            // smooth spin

  rotation += deg;

  wheel.style.transform = "rotate("+rotation+"deg)";

  /* RESULT */
  setTimeout(()=>{

    let rewards = {
      1:["₹30","₹60","₹15","₹75","Bonus ₹100","Bonus ₹300","₹100","₹50"],
      2:["₹200","₹300","₹150","Bonus ₹500","₹70","₹300","₹200","₹100"],
      3:["₹500","₹170","Bonus ₹400","₹100","Bonus ₹700","₹300","₹200","₹100"]
    };

    let reward = rewards[current][rand];

    alert("🎉 You won: " + reward);

  },4000);

}

</script>

</body>
</html>
