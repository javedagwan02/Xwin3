<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Wheel</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center/cover;
  color:#fff;
}

/* TITLE */
.title{
  text-align:center;
  font-size:22px;
  margin-top:20px;
  font-weight:bold;
}

/* ===== BOX CONTAINER ===== */
.box-wrapper{
  position:relative;
  width:90%;
  margin:20px auto;
}

/* IMAGE */
.box-img{
  width:100%;
  border-radius:20px;
}

/* CLICK AREAS */
.box{
  position:absolute;
  top:0;
  height:100%;
  width:33.33%;
  cursor:pointer;
}

/* 3 BOX POSITIONS */
.box1{ left:0; }
.box2{ left:33.33%; }
.box3{ left:66.66%; }

/* ACTIVE EFFECT */
.box.active{
  box-shadow:0 0 20px #00ff88 inset, 0 0 20px #00ff88;
  border-radius:20px;
}

/* OPTIONAL GLOW TEXT (future use) */
.label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-weight:bold;
}

</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<div class="box-wrapper">

  <!-- IMAGE -->
  <img src="images/41393-removebg-preview.png" class="box-img">

  <!-- CLICKABLE AREAS -->
  <div class="box box1 active" onclick="selectBox(1)"></div>
  <div class="box box2" onclick="selectBox(2)"></div>
  <div class="box box3" onclick="selectBox(3)"></div>

</div>

<script>

let selected = 1;

function selectBox(num){
  selected = num;

  document.querySelectorAll('.box').forEach(b=>{
    b.classList.remove('active');
  });

  document.querySelector('.box'+num).classList.add('active');

  console.log("Selected:", num);

  // 🔥 yaha baad me tu wheel change karega
  // 1 = ₹100
  // 2 = ₹500
  // 3 = ₹1000
}

</script>

</body>
</html>
