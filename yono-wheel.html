<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
  margin:0;
  background:#111;
  text-align:center;
  font-family:Arial;
}

/* TOP BOX */
.top-box{
  background:#fff;
  padding:10px;
  border-bottom:2px solid red;
}

.stats{
  margin:10px;
  background:#f2f2f2;
  padding:10px;
  border-radius:10px;
}

/* WHEEL */
.wheel-container{
  position:relative;
  margin-top:20px;
}

#wheel{
  width:280px;
  height:280px;
  border-radius:50%;
  border:10px solid gold;
  transition:4s cubic-bezier(.17,.67,.83,.67);
}

/* POINTER */
.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
}

/* BUTTON */
.spin-btn{
  margin-top:20px;
  background:red;
  color:#fff;
  padding:12px 30px;
  border-radius:30px;
  font-weight:bold;
  display:inline-block;
}

</style>
</head>

<body>

<div class="top-box">
  <h3>Wheel Spin</h3>
</div>

<div class="stats">
  Total Recharge: ₹0 <br>
  Spins: <span id="spins">3</span>
</div>

<div class="wheel-container">

  <div class="pointer">⬇️</div>

  <canvas id="wheel" width="300" height="300"></canvas>

</div>

<div class="spin-btn" onclick="spin()">GO</div>

<script>

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let options = [
  10, 28, 58, 88, 128, 588, 2000, "IPHONE"
];

let colors = [
  "#ff6384","#36a2eb","#4bc0c0","#ffcd56",
  "#8e44ad","#2ecc71","#e67e22","#e74c3c"
];

let startAngle = 0;

/* DRAW WHEEL */
function drawWheel(){
  let arc = Math.PI * 2 / options.length;

  for(let i=0;i<options.length;i++){
    let angle = startAngle + i * arc;

    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,140,angle,angle+arc);
    ctx.fill();

    ctx.save();
    ctx.fillStyle = "#fff";
    ctx.translate(150,150);
    ctx.rotate(angle + arc/2);
    ctx.fillText(options[i],70,0);
    ctx.restore();
  }
}

drawWheel();

/* SPIN */
function spin(){

  let spins = Number(document.getElementById("spins").innerText);

  if(spins <= 0){
    alert("No spins");
    return;
  }

  spins--;
  document.getElementById("spins").innerText = spins;

  let deg = Math.floor(5000 + Math.random()*5000);

  canvas.style.transform = "rotate("+deg+"deg)";

}

</script>

</body>
</html>
