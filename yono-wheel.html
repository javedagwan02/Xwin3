<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lucky Wheel</title>

<style>

html,body{
  margin:0;
  height:100%;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center/cover;
  color:#fff;
  text-align:center;
}

/* TITLE */
.title{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

/* SELECTOR */
.box-wrapper{
  position:relative;
  width:90%;
  margin:20px auto;
}
.box-img{width:100%;}
.box{position:absolute;top:0;height:100%;width:33.33%;}
.box1{left:0;} .box2{left:33.33%;} .box3{left:66.66%;}

.active-glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.15);
  box-shadow:0 0 15px #00ff88;
  transition:0.3s;
  pointer-events:none;
}

/* WHEEL */
.wheel{width:280px;}
.info{margin-top:10px;}
.spin-btn{
  margin-top:10px;
  background:#00e676;
  color:#000;
  padding:12px 30px;
  border-radius:25px;
  font-weight:bold;
}

.wallet{
  margin-top:10px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<div class="box-wrapper">
  <img src="images/41393-removebg-preview.png" class="box-img">

  <div class="box box1" onclick="selectBox(1)"></div>
  <div class="box box2" onclick="selectBox(2)"></div>
  <div class="box box3" onclick="selectBox(3)"></div>

  <div id="glow" class="active-glow" style="left:2%;"></div>
</div>

<img id="wheelImg" src="images/41383-removebg-preview.png" class="wheel">

<div class="info" id="infoText">
  Deposit ₹100 to get spin
</div>

<div class="spin-btn" onclick="spin()">SPIN</div>

<div class="wallet">
  💰 Main: ₹<span id="mainBal">0</span> |
  🎁 Bonus: ₹<span id="bonusBal">0</span>
</div>

<script>

/* ===== INIT STORAGE ===== */
if(!localStorage.getItem("main")) localStorage.setItem("main",0);
if(!localStorage.getItem("bonus")) localStorage.setItem("bonus",0);
if(!localStorage.getItem("depositDone")) localStorage.setItem("depositDone",0);
if(!localStorage.getItem("depositRequired")) localStorage.setItem("depositRequired",0);

updateUI();

/* ===== SELECT BOX ===== */
function selectBox(n){
  if(n==1){
    glow.style.left="2%";
    wheelImg.src="images/41383-removebg-preview.png";
    infoText.innerText="Deposit ₹100 to get spin";
  }
  if(n==2){
    glow.style.left="35%";
    wheelImg.src="images/41384-removebg-preview.png";
    infoText.innerText="Deposit ₹500 to get spin";
  }
  if(n==3){
    glow.style.left="68%";
    wheelImg.src="images/41387-removebg-preview.png";
    infoText.innerText="Deposit ₹1000 to get spin";
  }
}

/* ===== REWARDS ===== */
const rewards=[
  {type:"cash",value:3},
  {type:"cash",value:14},
  {type:"cash",value:35},
  {type:"cash",value:21},
  {type:"bonus",value:120},
  {type:"bonus",value:70},
  {type:"bonus",value:300},
  {type:"bonus",value:150}
];

/* ===== SPIN ===== */
function spin(){

  let r=rewards[Math.floor(Math.random()*rewards.length)];

  if(r.type=="cash"){
    let main=Number(localStorage.getItem("main"));
    localStorage.setItem("main",main+r.value);
    alert("🎉 You got ₹"+r.value+" CASH");
  }

  if(r.type=="bonus"){
    let bonus=Number(localStorage.getItem("bonus"));
    let depReq=Number(localStorage.getItem("depositRequired"));

    localStorage.setItem("bonus",bonus+r.value);
    localStorage.setItem("depositRequired",depReq + r.value*4);

    alert("🎁 You got ₹"+r.value+" BONUS");
  }

  updateUI();
}

/* ===== DEPOSIT (TEST BUTTON LIKE LOGIC) ===== */
function fakeDeposit(amount){

  let done=Number(localStorage.getItem("depositDone"));
  localStorage.setItem("depositDone",done+amount);

  checkBonusConvert();
}

/* ===== CONVERT BONUS ===== */
function checkBonusConvert(){

  let bonus=Number(localStorage.getItem("bonus"));
  let done=Number(localStorage.getItem("depositDone"));
  let req=Number(localStorage.getItem("depositRequired"));

  if(bonus>0 && done>=req){

    let main=Number(localStorage.getItem("main"));

    localStorage.setItem("main",main+bonus);
    localStorage.setItem("bonus",0);
    localStorage.setItem("depositDone",0);
    localStorage.setItem("depositRequired",0);

    alert("🔥 Bonus Converted to Main Wallet!");
  }

  updateUI();
}

/* ===== UI UPDATE ===== */
function updateUI(){
  mainBal.innerText=localStorage.getItem("main");
  bonusBal.innerText=localStorage.getItem("bonus");
}

</script>

</body>
</html>
