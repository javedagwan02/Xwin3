<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:Arial;
  height:100vh;
  overflow:hidden; /* 🔥 SCROLL FIX */

  background-image: url("images/file_000000004dd8720b92d40a8b6daf265e.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color:#fff;
  text-align:center;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

/* SELECT BOX */
.box-wrapper{
  position:relative;
  width:90%;
  margin:15px auto;
}

.box-img{
  width:100%;
  display:block;
}

.box{
  position:absolute;
  top:0;
  left:0;
  height:100%;
  width:33.33%;
  z-index:20;
  pointer-events:auto;
}

.box1{left:0;}
.box2{left:33.33%;}
.box3{left:66.66%;}

.glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.2);
  box-shadow:0 0 15px #00ff88;
  z-index:5;
}

/* POINTER */
.pointer{
  font-size:30px;
}

/* WHEEL */
.wheel-box{
  position:relative;
  width:280px;
  margin:10px auto;
}

.border{width:100%;}

.inner{
  position:absolute;
  top:50%;
  left:50%;
  width:78%;
  transform:translate(-50%,-50%) rotate(0deg);
  transition:4s ease-out;
}

/* TEXT */
.info{margin-top:10px;}

#spinLeft{
  margin-top:5px;
  color:#00ffcc;
}

/* BUTTONS */
.btn-container{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.btn{
  margin-top:15px;
  background:#00e676;
  padding:12px 30px;
  border-radius:25px;
  color:#000;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  width:85%;
  max-width:320px;
  padding:20px;
  border-radius:20px;
  background:#1e293b;
  text-align:center;
}

.popup-box button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00c853;
}
</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<div class="box-wrapper">
  <img src="images/41393-removebg-preview.png" class="box-img">

  <div class="box box1" onclick="selectWheel(1)"></div>
  <div class="box box2" onclick="selectWheel(2)"></div>
  <div class="box box3" onclick="selectWheel(3)"></div>

  <div id="glow" class="glow" style="left:2%;"></div>
</div>

<div class="pointer">⬇️</div>

<div class="wheel-box">
  <img id="border" src="images/41383-removebg-preview.png" class="border">
  <img id="wheel" src="images/41422-removebg-preview.png" class="inner">
</div>

<div id="infoText" class="info">Deposit ₹100 to get 1 spin</div>
<div id="spinLeft">Spins Left: 0</div>

<div class="btn-container">
  <div class="btn" onclick="spin()">SPIN</div>

  <div class="btn" style="background:#ff00cc;color:#fff;"
  onclick="goDeposit()">💰 Deposit</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

/* POPUP */
window.showPopup = function(title, message){
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupMessage").innerText = message;
  document.getElementById("popup").style.display = "flex";
}
window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}

/* VARIABLES */
let rotation = 0;
let current = 100;

let spins = {100:0,500:0,1000:0};

/* LOAD USER */
async function loadUser(){
  const email = localStorage.getItem("userEmail");

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",email))
  );

  snap.forEach(d=>{
    let data = d.data();
    spins[100] = data.spin100 || 0;
    spins[500] = data.spin500 || 0;
    spins[1000] = data.spin1000 || 0;
  });

  updateUI();
}
loadUser();

/* UI */
function updateUI(){
  document.getElementById("spinLeft").innerText =
    "Spins Left: " + (spins[current] || 0);
}

/* SELECT */
window.selectWheel = function(n){

  if(n==1) current = 100;
  if(n==2) current = 500;
  if(n==3) current = 1000;

  updateUI();
}

/* WALLET UPDATE */
async function updateWallet(type, amount){
  const email = localStorage.getItem("userEmail");

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",email))
  );

  snap.forEach(async (docSnap)=>{
    let data = docSnap.data();

    let bal = data.balance || 0;
    let bonus = data.bonusBalance || 0;

    if(type=="cash") bal += amount;
    else bonus += amount;

    await updateDoc(doc(db,"users",docSnap.id),{
      balance:bal,
      bonusBalance:bonus
    });
  });
}

/* SPIN */
window.spin = function(){

  if((spins[current] || 0) <= 0){
    showPopup("❌ No Spins","Deposit required");
    return;
  }

  let wheel = document.getElementById("wheel");

  let rand = Math.floor(Math.random()*8);
  let deg = 360*5 + rand*45;

  rotation += deg;
  wheel.style.transform = `translate(-50%,-50%) rotate(${rotation}deg)`;

  let rewards = {
    100:["cash_30","cash_60","cash_15","cash_75","bonus_100","bonus_300","cash_100","cash_50"],
    500:["cash_200","cash_300","cash_150","bonus_500","cash_70","cash_300","cash_200","cash_100"],
    1000:["cash_500","cash_170","bonus_400","cash_100","bonus_700","cash_300","cash_200","cash_100"]
  };

  setTimeout(async ()=>{

    let result = rewards[current][rand];
    let type = result.split("_")[0];
    let amount = Number(result.split("_")[1]);

    await updateWallet(type, amount);

    spins[current]--;

    const snap = await getDocs(
      query(collection(db,"users"), where("email","==",localStorage.getItem("userEmail")))
    );

    snap.forEach(async (docSnap)=>{
      await updateDoc(doc(db,"users",docSnap.id),{
        ["spin"+current]: spins[current]
      });
    });

    updateUI();

    showPopup("🎉 You Won", "₹"+amount);

  },4000);
}

/* DEPOSIT */
window.goDeposit = function(){
  window.location.href = "deposit.html";
}
  window.addEventListener("focus", loadUser);
</script>

<div id="popup" class="popup">
  <div class="popup-box">
    <h3 id="popupTitle"></h3>
    <p id="popupMessage"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

</body>
</html>
