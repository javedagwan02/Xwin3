<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deposit Spin</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center/cover;
  color:#fff;
  text-align:center;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.wallet{
  font-weight:bold;
}

.help{
  background:#111;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* WHEEL */
.wheel-box{
  margin-top:20px;
}

.wheel{
  width:280px;
}

/* SPINS */
.spin-count{
  margin-top:10px;
  font-size:16px;
}

/* BUTTON */
.spin-btn{
  margin-top:15px;
  background:#00e676;
  color:#000;
  padding:12px 30px;
  border-radius:25px;
  font-weight:bold;
  display:inline-block;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:80%;
}

.popup-box h3{
  margin-top:0;
}

.popup-box div{
  margin:8px 0;
}

.close{
  margin-top:10px;
  padding:10px;
  background:#ff3b3b;
  border:none;
  border-radius:8px;
  color:#fff;
  width:100%;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="wallet">₹ <span id="balance">0</span></div>
  <div class="help" onclick="openPopup()">?</div>
</div>

<!-- WHEEL -->
<div class="wheel-box">
  <img src="images/41387-removebg-preview.png" class="wheel">
</div>

<div class="spin-count">
  Spins: <span id="spins">0</span>
</div>

<div class="spin-btn" onclick="spin()">SPIN</div>

<!-- RULE POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>🎁 Spin Rules</h3>

    <div>Deposit ₹200 → 1 Spin</div>
    <div>Deposit ₹1000 → 2 Spins</div>
    <div>Deposit ₹5000 → 7 Spins</div>
    <div>Deposit ₹10,000 → 12 Spins</div>
    <div>Deposit ₹50,000 → 20 Spins</div>

    <button class="close" onclick="closePopup()">Close</button>
  </div>
</div>

<script>

/* ===== INIT ===== */
if(!localStorage.getItem("balance")) localStorage.setItem("balance",0);
if(!localStorage.getItem("spins")) localStorage.setItem("spins",0);

updateUI();

/* ===== DEPOSIT LOGIC ===== */
function addDeposit(amount){

  let spins = Number(localStorage.getItem("spins"));

  if(amount >= 50000) spins += 20;
  else if(amount >= 10000) spins += 12;
  else if(amount >= 5000) spins += 7;
  else if(amount >= 1000) spins += 2;
  else if(amount >= 200) spins += 1;

  localStorage.setItem("spins", spins);

  alert("Deposit successful + spins added 🎉");

  updateUI();
}

/* ===== SPIN ===== */
function spin(){

  let spins = Number(localStorage.getItem("spins"));

  if(spins <= 0){
    return alert("No spins available ❌");
  }

  spins--;
  localStorage.setItem("spins", spins);

  // 🔥 RANDOM CASH WIN
  let win = Math.floor(Math.random() * 500) + 10;

  let bal = Number(localStorage.getItem("balance"));
  bal += win;

  localStorage.setItem("balance", bal);

  alert("🎉 You won ₹" + win);

  updateUI();
}

/* ===== UI ===== */
function updateUI(){
  balance.innerText = localStorage.getItem("balance");
  spins.innerText = localStorage.getItem("spins");
}

/* ===== POPUP ===== */
function openPopup(){
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
