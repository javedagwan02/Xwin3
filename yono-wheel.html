<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lucky Wheel</title>

<style>

html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center center;
  background-size:cover;
  color:#fff;
  text-align:center;
  overflow-x:hidden;
}

/* TITLE */
.title{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

/* ===== BOX ===== */
.box-wrapper{
  position:relative;
  width:90%;
  margin:20px auto;
}

.box-img{
  width:100%;
  display:block;
}

/* CLICK AREA (invisible) */
.box{
  position:absolute;
  top:0;
  height:100%;
  width:33.33%;
}

.box1{ left:0; }
.box2{ left:33.33%; }
.box3{ left:66.66%; }

/* CLEAN ACTIVE HIGHLIGHT */
.active-glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.15);
  box-shadow:0 0 15px #00ff88;
  transition:0.3s;
  pointer-events:none;
}

/* ===== WHEEL ===== */
.wheel-container{
  margin-top:10px;
}

.wheel{
  width:280px;
}

/* POINTER */
.pointer{
  margin-top:-10px;
  font-size:30px;
}

/* TEXT */
.info{
  margin-top:15px;
  font-size:15px;
}

/* SPIN BUTTON (NOW BELOW TEXT) */
.spin-btn{
  margin-top:10px;
  background:#00e676;
  color:#000;
  padding:12px 28px;
  border-radius:25px;
  font-weight:bold;
  display:inline-block;
}

</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<!-- ===== SELECTOR ===== -->
<div class="box-wrapper">

  <img src="images/41393-removebg-preview.png" class="box-img">

  <!-- hidden click -->
  <div class="box box1" onclick="selectBox(1)"></div>
  <div class="box box2" onclick="selectBox(2)"></div>
  <div class="box box3" onclick="selectBox(3)"></div>

  <!-- highlight -->
  <div id="glow" class="active-glow" style="left:2%;"></div>

</div>

<!-- ===== WHEEL ===== -->
<div class="wheel-container">

  <div class="pointer">⬇️</div>

  <img id="wheelImg" src="images/41383-removebg-preview.png" class="wheel">

</div>

<!-- TEXT -->
<div class="info" id="infoText">
  Deposit ₹100 to get spin
</div>

<!-- SPIN BUTTON BELOW TEXT -->
<div class="spin-btn">SPIN</div>

<script>

function selectBox(n){

  let glow = document.getElementById("glow");

  if(n==1){
    glow.style.left = "2%";
    wheelImg.src = "images/41383-removebg-preview.png";
    infoText.innerText = "Deposit ₹100 to get spin";
  }

  if(n==2){
    glow.style.left = "35%";
    wheelImg.src = "images/41384-removebg-preview.png";
    infoText.innerText = "Deposit ₹500 to get spin";
  }

  if(n==3){
    glow.style.left = "68%";
    wheelImg.src = "images/41387-removebg-preview.png";
    infoText.innerText = "Deposit ₹1000 to get spin";
  }

}

</script>

</body>
</html>
