<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial;
  background:url('images/file_000000004dd8720b92d40a8b6daf265e.png') no-repeat center center;
  background-size:cover;
  color:#fff;
  text-align:center;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

/* ===== TOP BUTTON IMAGE ===== */
.box-wrapper{
  position:relative;
  width:90%;
  margin:15px auto;
}

.box-img{
  width:100%;
}

/* invisible click areas */
.box{
  position:absolute;
  top:0;
  height:100%;
  width:33.33%;
}

.box1{left:0;}
.box2{left:33.33%;}
.box3{left:66.66%;}

/* glow */
.glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.2);
  box-shadow:0 0 15px #00ff88;
  transition:0.3s;
}

/* ===== WHEEL ===== */
.wheel-section{
  margin-top:10px;
  position:relative;
}

.pointer{
  font-size:30px;
  margin-bottom:-10px;
}

.wheel{
  width:260px;
}

/* TEXT */
.info{
  margin-top:10px;
  font-size:14px;
}

/* DEPOSIT BUTTON */
.deposit-btn{
  margin-top:15px;
  display:inline-block;
  background:linear-gradient(#00e676,#00c853);
  padding:12px 35px;
  border-radius:25px;
  font-weight:bold;
  color:#000;
}

</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<!-- ===== TOP SELECT ===== -->
<div class="box-wrapper">

  <img src="images/41393-removebg-preview.png" class="box-img">

  <div class="box box1" onclick="selectBox(1)"></div>
  <div class="box box2" onclick="selectBox(2)"></div>
  <div class="box box3" onclick="selectBox(3)"></div>

  <div id="glow" class="glow" style="left:2%;"></div>

</div>

<!-- ===== WHEEL ===== -->
<div class="wheel-section">

  <div class="pointer">⬇️</div>

  <img id="wheelImg" src="images/41383-removebg-preview.png" class="wheel">

</div>

<!-- TEXT -->
<div id="infoText" class="info">
  Deposit ₹100 to get 1 spin
</div>

<!-- BUTTON -->
<div class="deposit-btn">Deposit</div>

<script>

function selectBox(n){

  let glow = document.getElementById("glow");
  let wheel = document.getElementById("wheelImg");
  let text = document.getElementById("infoText");

  if(n==1){
    glow.style.left = "2%";
    wheel.src = "images/41383-removebg-preview.png";
    text.innerText = "Deposit ₹100 to get 1 spin";
  }

  if(n==2){
    glow.style.left = "35%";
    wheel.src = "images/41384-removebg-preview.png";
    text.innerText = "Deposit ₹500 to get 1 spin";
  }

  if(n==3){
    glow.style.left = "68%";
    wheel.src = "images/41387-removebg-preview.png";
    text.innerText = "Deposit ₹1000 to get 1 spin";
  }

}

</script>

</body>
</html>
