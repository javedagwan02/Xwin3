<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html, body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:Arial;
  min-height:100vh;

  background-image: url("images/file_000000004dd8720b92d40a8b6daf265e.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color:#fff;
  text-align:center;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

/* SELECT BOX */
.box-wrapper{
  position:relative;
  width:90%;
  margin:15px auto;
}
.box-img{width:100%;}

.box{
  position:absolute;
  top:0;
  height:100%;
  width:33.33%;
}
.box1{left:0;}
.box2{left:33.33%;}
.box3{left:66.66%;}

.glow{
  position:absolute;
  top:5%;
  height:90%;
  width:30%;
  border-radius:12px;
  background:rgba(0,255,150,0.2);
  box-shadow:0 0 15px #00ff88;
  transition:0.3s;
}

/* POINTER */
.pointer{
  font-size:30px;
  margin-top:5px;
}

/* WHEEL BOX */
.wheel-box{
  position:relative;
  width:280px;
  margin:10px auto;
}

/* BORDER */
.border{
  width:100%;
}

/* INNER WHEEL PERFECT CENTER */
.inner{
  position:absolute;
  top:50%;
  left:50%;
  width:78%;
  transform:translate(-50%,-50%) rotate(0deg);
  transition:4s ease-out;
}

/* TEXT */
.info{
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  background:#00e676;
  padding:12px 30px;
  border-radius:25px;
  color:#000;
  font-weight:bold;
  display:inline-block;
}
/* 🔥 POPUP FULL SCREEN */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* 🔥 BOX DESIGN */
.popup-box{
  width:85%;
  max-width:320px;
  padding:20px;
  border-radius:20px;
  text-align:center;

  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

  box-shadow:
    0 0 20px rgba(0,255,150,0.6),
    inset 0 0 10px rgba(255,255,255,0.1);

  animation:popupAnim 0.3s ease;
}

/* 🔥 ICON */
.popup-icon{
  font-size:40px;
  margin-bottom:10px;
}

/* 🔥 TITLE */
.popup-box h2{
  margin:5px 0;
  color:#00ffcc;
}

/* 🔥 MESSAGE */
.popup-box p{
  margin:10px 0;
  font-size:15px;
  color:#ddd;
}

/* 🔥 BUTTON */
.popup-box button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;

  background:linear-gradient(45deg,#00ffcc,#00c853);
  color:#000;
  font-weight:bold;
}

/* 🔥 ANIMATION */
@keyframes popupAnim{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="title">🎡 Lucky Wheel</div>

<!-- SELECT -->
<div class="box-wrapper">
  <img src="images/41393-removebg-preview.png" class="box-img">

  <div class="box box1" onclick="selectWheel(1)"></div>
  <div class="box box2" onclick="selectWheel(2)"></div>
  <div class="box box3" onclick="selectWheel(3)"></div>

  <div id="glow" class="glow" style="left:2%;"></div>
</div>

<!-- POINTER -->
<div class="pointer">⬇️</div>

<!-- WHEEL -->
<div class="wheel-box">

  <!-- BORDER -->
  <img id="border" src="images/41383-removebg-preview.png" class="border">

  <!-- INNER -->
  <img id="wheel" src="images/41422-removebg-preview.png" class="inner">

</div>

<div id="infoText" class="info">
  Deposit ₹100 to get 1 spin
</div>

<div class="btn" onclick="spin()">SPIN</div>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

/* 🔥 GLOBAL POPUP (IMPORTANT FIX) */
window.showPopup = function(title, message, icon="💰"){
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupMessage").innerText = message;
  document.getElementById("popupIcon").innerText = icon;
  document.getElementById("popup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}

/* 🔥 VARIABLES */
let rotation = 0;
let current = 1;

let unlocked = {
  100:false,
  500:false,
  1000:false
};

/* 🔥 LOAD USER */
async function loadUser(){

  const userEmail = localStorage.getItem("userEmail");

  if(!userEmail){
    showPopup("❌ Login Required","Please login first","🚫");
    return;
  }

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  snap.forEach(doc=>{
    let data = doc.data();

    unlocked[100] = data.unlocked100 || false;
    unlocked[500] = data.unlocked500 || false;
    unlocked[1000] = data.unlocked1000 || false;
  });

  console.log("UNLOCK STATUS:", unlocked);
}

loadUser();

/* 🔥 SELECT WHEEL */
window.selectWheel = function(n){

  let glow = document.getElementById("glow");
  let border = document.getElementById("border");
  let wheel = document.getElementById("wheel");
  let infoText = document.getElementById("infoText");

  if(n==1 && !unlocked[100]){
    showPopup("❌ Access Denied","Deposit ₹100 required","🚫");
    return;
  }

  if(n==2 && !unlocked[500]){
    showPopup("❌ Access Denied","Deposit ₹500 required","🚫");
    return;
  }

  if(n==3 && !unlocked[1000]){
    showPopup("❌ Access Denied","Deposit ₹1000 required","🚫");
    return;
  }

  rotation = 0;
  wheel.style.transform = "translate(-50%,-50%) rotate(0deg)";

  current = n;

  if(n==1){
    glow.style.left="2%";
    border.src="images/41383-removebg-preview.png";
    wheel.src="images/41422-removebg-preview.png";
    infoText.innerText="Deposit ₹100 to get 1 spin";
  }

  if(n==2){
    glow.style.left="35%";
    border.src="images/41384-removebg-preview.png";
    wheel.src="images/41433-removebg-preview.png";
    infoText.innerText="Deposit ₹500 to get 1 spin";
  }

  if(n==3){
    glow.style.left="68%";
    border.src="images/41387-removebg-preview.png";
    wheel.src="images/41464-removebg-preview.png";
    infoText.innerText="Deposit ₹1000 to get 1 spin";
  }

}

/* 🔥 SPIN */
window.spin = function(){

  if(current==1 && !unlocked[100]){
    showPopup("❌ Access Denied","Deposit ₹100 required","🚫");
    return;
  }

  if(current==2 && !unlocked[500]){
    showPopup("❌ Access Denied","Deposit ₹500 required","🚫");
    return;
  }

  if(current==3 && !unlocked[1000]){
    showPopup("❌ Access Denied","Deposit ₹1000 required","🚫");
    return;
  }

  let wheel = document.getElementById("wheel");

  let rand = Math.floor(Math.random()*8);
  let deg = 360*5 + (rand * 45);

  rotation += deg;

  wheel.style.transform = "translate(-50%,-50%) rotate("+rotation+"deg)";

  let rewards = {
    1:["cash_30","cash_60","cash_15","cash_75","bonus_100","bonus_300","cash_100","cash_50"],
    2:["cash_200","cash_300","cash_150","bonus_500","cash_70","cash_300","cash_200","cash_100"],
    3:["cash_500","cash_170","bonus_400","cash_100","bonus_700","cash_300","cash_200","cash_100"]
  };

  setTimeout(()=>{

    let result = rewards[current][rand];

    let type = result.split("_")[0];
    let amount = result.split("_")[1];

    if(type=="cash"){
      showPopup("🎉 You Won!","₹"+amount+" Cash Added","💰");
    }else{
      showPopup("🎁 Bonus Win!","₹"+amount+" Bonus Added","🎁");
    }

  },4000);

}

    </script>
<div id="popup" class="popup">
  <div class="popup-box">

    <div id="popupIcon" class="popup-icon">💰</div>

    <h2 id="popupTitle">Title</h2>

    <p id="popupMessage">Message</p>

    <button onclick="closePopup()">OK</button>

  </div>
</div>
</body>
</html>
