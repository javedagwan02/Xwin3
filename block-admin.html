<!DOCTYPE html>
<html>
<head>
  <title>👑 User Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{background:#0f172a;color:white;font-family:sans-serif;}
    .card{
      background:#1e293b;
      margin:10px;
      padding:12px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,255,150,0.3);
    }
    .btn{
      margin:4px;
      padding:6px 10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }
    .block{background:red;color:#fff;}
    .unblock{background:#00e676;color:#000;}
    .add{background:#2196f3;color:#fff;}
    .minus{background:#ff9800;color:#000;}
    input{padding:6px;width:80px;border-radius:6px;border:none;}
  </style>
</head>

<body>

<h2 style="text-align:center;">👑 USER CONTROL PANEL</h2>
  <input 
  type="text" 
  id="searchBox" 
  placeholder="Search by email..." 
  style="width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;border:none;font-size:16px;"
>
<div id="list"></div>
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  doc, 
  updateDoc, 
  increment, 
  deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);
const list = document.getElementById("list");

/* 🔥 GLOBAL USERS */
let allUsers = [];

/* 🔥 RENDER FUNCTION */
function renderUsers(users){

  list.innerHTML = "";

  if(users.length === 0){
    list.innerHTML = "❌ No user found";
    return;
  }

  users.forEach(u=>{

    let id = u.id;

    let box = document.createElement("div");
    box.className = "card";

    box.innerHTML = `
📧 <b>${u.email}</b><br>
💰 Wallet: ₹${u.balance || 0}<br>
🚫 Status: ${u.blocked ? "BLOCKED" : "ACTIVE"}<br>

🕒 Registered: ${
  u.timeStamp 
    ? new Date(u.timeStamp).toLocaleString("en-IN")
    : "N/A"
}<br>

🔑 Password: ${u.password ? u.password : "N/A"}<br><br>

<input type="number" id="amt_${id}" placeholder="Amount">

<button class="btn add" onclick="addMoney('${id}')">+ Add</button>
<button class="btn minus" onclick="minusMoney('${id}')">- Minus</button>

<br><br>

${
  u.blocked
  ? `<button class="btn unblock" onclick="toggleBlock('${id}', false)">UNBLOCK</button>`
  : `<button class="btn block" onclick="toggleBlock('${id}', true)">BLOCK</button>`
}

<br><br>

<button class="btn" style="background:#000;color:#fff" onclick="deleteUser('${id}')">
🗑 Delete
</button>
`;

    list.appendChild(box);
  });
}

/* 🔥 LIVE USERS */
onSnapshot(collection(db,"users"), (snap)=>{

  allUsers = [];

  snap.forEach(d=>{
    let u = d.data();
u.id = d.id;

// 🔥 force password fix
u.password = u.password || "";

allUsers.push(u);
  });

  renderUsers(allUsers);

});

/* 🔥 SEARCH SYSTEM */
document.getElementById("searchBox").addEventListener("input", function(){

  let value = this.value.toLowerCase();

  let filtered = allUsers.filter(u =>
    (u.email || "").toLowerCase().includes(value)
  );

  renderUsers(filtered);
});

/* 🔥 FUNCTIONS */
window.addMoney = async(id)=>{
  let amt = +document.getElementById("amt_"+id).value;
  if(!amt) return alert("Enter amount");

  let userRef = doc(db,"users",id);

  // 🔥 current data lo
  const snap = allUsers.find(u => u.id === id);
  let currentBalance = Number(snap.balance || 0);

  await updateDoc(userRef,{
    balance: currentBalance + amt
  });
  document.getElementById("amt_"+id).value = "";
};

window.minusMoney = async(id)=>{
  let amt = +document.getElementById("amt_"+id).value;
  if(!amt) return alert("Enter amount");

  let userRef = doc(db,"users",id);

  const snap = allUsers.find(u => u.id === id);
  let currentBalance = Number(snap.balance || 0);

  if(amt > currentBalance){
    alert("Insufficient balance");
    return;
  }

  await updateDoc(userRef,{
    balance: currentBalance - amt
  });
  document.getElementById("amt_"+id).value = "";
};

window.toggleBlock = async(id,status)=>{
  await updateDoc(doc(db,"users",id),{
    blocked: status
  });
};
  window.deleteUser = async(id)=>{
  if(!confirm("User delete karna hai?")) return;

  await deleteDoc(doc(db,"users",id));

  alert("User Deleted ✅");

  // 🔥 yaha dalna hai
  location.reload();
};
</script>
  
</body>
</html>
