<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  background:radial-gradient(circle at top,#168cff,#064bb5 45%,#03143f);
  min-height:100vh;
  padding-bottom:20px;
}

/* HEADER */
.header{
  width:90%;
  margin:18px auto;
  padding:15px;
  text-align:center;
  font-size:25px;
  font-weight:900;
  color:#ffe620;
  background:linear-gradient(#1d85ff,#073b9a);
  border:4px solid #62caff;
  border-radius:20px;
  box-shadow:0 6px 0 #062b78;
  text-shadow:2px 2px #000;
}

/* BANNER CARD */
.banner{
  width:92%;
  margin:18px auto;
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  background:linear-gradient(#1d85ff,#073b9a);
  border:4px solid #62caff;
  box-shadow:0 6px 0 #062b78;
  transition:all .15s ease;
}

.banner:active{
  transform:translateY(3px) scale(.98);
  box-shadow:0 2px 0 #062b78;
}

.banner img{
  width:100%;
  display:block;
  border-radius:18px;
}
</style>

</head>

<body>

<div class="header">
🎁 Latest Offers
</div>

<!-- 🔥 Banner 1 -->
<div class="banner" onclick="openEvent()">
  <img src="images/file_00000000e32872438c6eb1bc53d9b52a.png">
</div>

<!-- 🔥 Banner 2 -->
<div class="banner" onclick="window.location.href='first-deposit.html'">
  <img src="images/file_00000000b998720b942a27338c28c0c5.png">
</div>

<!-- 🔥 Banner 3 -->
<div class="banner" onclick="location.href='index.html'">
  <img src="images/file_00000000116c71f89dd3256a26d4225b.png">
</div>

<!-- 🔥 Banner 4 -->
<div class="banner" onclick="location.href='vip.html'">
  <img src="images/file_00000000f33871faaf8834319bbe62d2.png">
</div>

<script>
function openEvent(){
  window.location.href = "yono-wheel.html";
}
</script>

</body>
</html>
