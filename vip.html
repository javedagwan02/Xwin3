<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
    padding:15px;
}

.vip-header{
    background:linear-gradient(135deg,#ff7d7d,#ff9f9f);
    border-radius:22px;
    padding:20px;
    color:white;
    margin-bottom:20px;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile img{
    width:75px;
    height:75px;
    border-radius:50%;
    border:3px solid white;
}

.profile h2{
    font-size:22px;
}

.profile p{
    margin-top:5px;
    opacity:0.95;
}

.timer-box{
    margin-top:18px;
    background:rgba(255,255,255,0.2);
    padding:12px;
    border-radius:14px;
    text-align:center;
}

.timer-title{
    font-size:14px;
    margin-bottom:5px;
}

#timer{
    font-size:22px;
    font-weight:bold;
}

.vip-card{
    background:white;
    border-radius:22px;
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.vip-name{
    font-size:30px;
    font-weight:bold;
    color:#ff5a5a;
}

.deposit-box{
    background:#fff1f1;
    color:#ff4d4d;
    padding:10px 15px;
    border-radius:12px;
    font-weight:bold;
}

.progress-title{
    margin-bottom:10px;
    font-size:18px;
}

.progress{
    width:100%;
    height:13px;
    background:#e5e5e5;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:100%;
    background:linear-gradient(90deg,#ff5858,#ffb258);
}

.reward-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:18px;
}

.reward{
    background:#fff5f5;
    border-radius:18px;
    padding:15px;
    transition:0.3s;
}

.reward.active{
    background:#20b15a;
    color:white;
}

.reward.active h3,
.reward.active p,
.reward.active .amount{
    color:white;
}

.reward h3{
    color:#ff5a5a;
    margin-bottom:8px;
}

.reward p{
    font-size:14px;
    line-height:22px;
    color:#666;
}

.amount{
    font-size:34px;
    font-weight:bold;
    margin-top:14px;
    color:#111;
}

.claim-btn{
    margin-top:12px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#ff5a5a;
    color:white;
    font-size:15px;
    cursor:pointer;
    font-weight:bold;
}

.reward.active .claim-btn{
    background:white;
    color:#20b15a;
}

.note{
    margin-top:15px;
    color:#555;
    line-height:24px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="vip-header">

    <div class="profile">

        <img src="https://i.pravatar.cc/150?img=12">

        <div>
            <h2>MR ARMAN</h2>
            <p>Deposit More & Unlock VIP Rewards</p>
        </div>

    </div>

    <div class="timer-box">

        <div class="timer-title">
            Next Monthly Reward In
        </div>

        <div id="timer">
            Loading...
        </div>

    </div>

</div>

<div id="vipContainer"></div>

<script>

const vipData = [

{
vip:"VIP1",
depositNeed:"1000",
monthlyReward:"30",
levelReward:"60",
completed:true
},

{
vip:"VIP2",
depositNeed:"3000",
monthlyReward:"90",
levelReward:"180",
completed:false
},

{
vip:"VIP3",
depositNeed:"40000",
monthlyReward:"290",
levelReward:"690",
completed:false
},

{
vip:"VIP4",
depositNeed:"4000000",
monthlyReward:"690",
levelReward:"1690",
completed:false
},

{
vip:"VIP5",
depositNeed:"20000000",
monthlyReward:"1690",
levelReward:"6900",
completed:false
},

{
vip:"VIP6",
depositNeed:"80000000",
monthlyReward:"6900",
levelReward:"16900",
completed:false
},

{
vip:"VIP7",
depositNeed:"300000000",
monthlyReward:"16900",
levelReward:"69000",
completed:false
},

{
vip:"VIP8",
depositNeed:"1000000000",
monthlyReward:"69000",
levelReward:"169000",
completed:false
},

{
vip:"VIP9",
depositNeed:"5000000000",
monthlyReward:"169000",
levelReward:"690000",
completed:false
},

{
vip:"VIP10",
depositNeed:"9999999999",
monthlyReward:"690000",
levelReward:"1690000",
completed:false
}

];

const container = document.getElementById("vipContainer");

vipData.forEach((item,index)=>{

container.innerHTML += `

<div class="vip-card">

    <div class="top">

        <div class="vip-name">
            ${item.vip}
        </div>

        <div class="deposit-box">
            Deposit ₹${Number(item.depositNeed).toLocaleString()}
        </div>

    </div>

    <div class="progress-title">
        VIP Level Progress
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="reward-grid">

        <div class="reward ${item.completed ? 'active' : ''}" id="monthly${index}">

            <h3>Monthly Reward</h3>

            <p>
                Har month active VIP users ko ye reward milega.
            </p>

            <div class="amount">
                ₹${Number(item.monthlyReward).toLocaleString()}
            </div>

            <button class="claim-btn"
            onclick="claimReward('monthly${index}')">
                Claim Reward
            </button>

        </div>

        <div class="reward ${item.completed ? 'active' : ''}" id="level${index}">

            <h3>Level Up Reward</h3>

            <p>
                Sirf 1 baar milega jab VIP level complete ho jayega.
            </p>

            <div class="amount">
                ₹${Number(item.levelReward).toLocaleString()}
            </div>

            <button class="claim-btn"
            onclick="claimReward('level${index}')">
                Claim Reward
            </button>

        </div>

    </div>

    <div class="note">
        Deposit karne per VIP level increase hoga.
        VIP complete hone per reward green ho jayega.
    </div>

</div>

`;

});

function claimReward(id){

let box = document.getElementById(id);

if(box.classList.contains("active")){

    alert("Reward Claimed Successfully ✅");

    box.classList.remove("active");

    let btn = box.querySelector(".claim-btn");

    btn.innerHTML = "Claimed";

    btn.disabled = true;

}

}

function updateTimer(){

const now = new Date();

let nextMonth = new Date(
now.getFullYear(),
now.getMonth()+1,
1,
0,0,0
);

const diff = nextMonth - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const mins = Math.floor((diff / (1000*60)) % 60);
const secs = Math.floor((diff / 1000) % 60);

document.getElementById("timer").innerHTML =
`${days}D ${hours}H ${mins}M ${secs}S`;

}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
