<!DOCTYPE html>
<html>
<head>
  <title>🔥 Live Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif;">

<h2 style="text-align:center;">🔥 LIVE BETS</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 TERA SAME FIREBASE CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 LIVE DATA */
onSnapshot(collection(db,"liveBets"), (snap)=>{

  document.getElementById("list").innerHTML = "";

  snap.forEach(doc=>{

    let d = doc.data();

    let box = document.createElement("div");

    box.style.background = "#1e293b";
    box.style.margin = "10px";
    box.style.padding = "12px";
    box.style.borderRadius = "12px";
    box.style.boxShadow = "0 0 10px rgba(0,255,150,0.3)";

    box.innerHTML = `
      📧 <b>${d.email}</b><br><br>
      🎮 Game: ${d.game}<br>
      💰 Amount: ₹${d.amount}<br>
      🎯 Selection: ${d.selection}<br>
      ⏰ Time: ${new Date(d.time).toLocaleTimeString()}<br>
      📊 Status: ${d.status}
    `;

    document.getElementById("list").appendChild(box);
  });

});

</script>

</body>
</html>
