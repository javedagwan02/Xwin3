<!DOCTYPE html>
<html>
<head>
  <title>🔥 Live Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:sans-serif;
    }

    .btn{
      margin:5px;
      padding:8px 14px;
      border:none;
      border-radius:20px;
      background:#00e676;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .card{
      background:#1e293b;
      margin:10px;
      padding:12px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,255,150,0.3);
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">🔥 LIVE BETS</h2>

<div style="text-align:center;margin:10px;">
  <button onclick="filterGame('all')" class="btn">ALL</button>
  <button onclick="filterGame('horse')" class="btn">🐎 Horse</button>
  <button onclick="filterGame('7up')" class="btn">🎲 7UpDown</button>
  <button onclick="filterGame('pubg')" class="btn">🔫 PUBG</button>
</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentGame = "all";
let allBets = [];

window.filterGame = function(game){
  currentGame = game;
  renderList();
}

function renderList(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  allBets.forEach(d=>{

    if(!d.email || !d.game || !d.amount || !d.selection || !d.time){
      return;
    }

    if(currentGame !== "all" && d.game !== currentGame){
      return;
    }

    let box = document.createElement("div");
    box.className = "card";

    box.innerHTML = `
      📧 <b>${d.email}</b><br><br>
      🎮 Game: ${d.game}<br>
      💰 Amount: ₹${d.amount}<br>
      🎯 Selection: ${d.selection}<br>
      ⏰ Time: ${new Date(d.time).toLocaleTimeString()}<br>
      📊 Status: ${d.status}
    `;

    list.appendChild(box);
  });
}

onSnapshot(collection(db,"liveBets"), (snap)=>{

  allBets = [];

  snap.forEach(doc=>{
    allBets.push(doc.data());
  });

  renderList();

}); // ✅ IMPORTANT FIX

</script>

</body>
</html>
