<!DOCTYPE html>
<html>
<head>
<title>Admin Auto Round</title>
</head>
<body>

<h2>Auto Round Running...</h2>


  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

let running = false;

// 🎯 FINAL RESULT LOGIC (STRICT)
async function getResult(){

  const snap = await getDoc(doc(db,"bets","global"));

  if(!snap.exists()){
    return "MID"; // safety
  }

  const data = snap.data();

  let low = Number(data.LOW) || 0;
  let high = Number(data.HIGH) || 0;

  console.log("LOW:",low,"HIGH:",high);

  // ✅ SAME → MID
  if(low === high){
    return "MID";
  }

  // ✅ JISPE JYADA → WO HAREGA
  if(low > high){
    return "HIGH";
  }else{
    return "LOW";
  }
}

// 🎲 DICE
function getDice(r){
  if(r==="LOW") return {d1:1,d2:2};
  if(r==="HIGH") return {d1:6,d2:5};
  return {d1:3,d2:4};
}

// 🔥 MAIN LOOP
async function startGame(){

  if(running) return;
  running = true;

  while(true){

    const r = await getResult();
    const d = getDice(r);

    // 🔥 ROUND CREATE
    await setDoc(doc(db,"gameRounds","current"),{
      roundId: Date.now(),
      startTime: Date.now(),
      result: r,
      d1: d.d1,
      d2: d.d2
    });

    console.log("✅ RESULT:", r);

    // 🔥 RESET BETS (VERY IMPORTANT)
    await setDoc(doc(db,"bets","global"),{
      LOW:0,
      HIGH:0,
      MID:0
    });

    // ⏱ wait 20 sec
    await new Promise(res => setTimeout(res, 20000));
  }
}

// 🚀 START
startGame();

  </script>

</body>
</html>
