<!DOCTYPE html>
<html>
<head>
<title>Admin Auto Round</title>
</head>
<body>

<h2>Auto Round Running...</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

// 🎲 RESULT
function getResult(){
  const arr=["LOW","HIGH","MID"];
  return arr[Math.floor(Math.random()*3)];
}

// 🎲 DICE
function getDice(r){
  if(r==="LOW") return {d1:1,d2:2};
  if(r==="HIGH") return {d1:6,d2:5};
  return {d1:3,d2:4};
}

// 🔥 MAIN LOOP (IMPORTANT)
async function startGame(){

  while(true){

    const r = getResult();
    const d = getDice(r);

    await setDoc(doc(db,"gameRounds","current"),{
      roundId: Date.now(),
      startTime: Date.now(),
      result: r,
      d1: d.d1,
      d2: d.d2
    });

    console.log("✅ NEW ROUND");

    // ⏱ wait 20 sec
    await new Promise(res => setTimeout(res, 20000));
  }
}

// 🔥 RUN
startGame();

// 🔥 VISIBILITY FIX (VERY IMPORTANT)
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    console.log("🔁 Restarting loop");
    startGame();
  }
});

</script>

</body>
</html>
