window.closeRefPopup = function(){

window.openReferralDetails = async function(){

  document.getElementById("refPopup").style.display = "flex";

  const myCode = localStorage.getItem("refCode");

  let html = "";
  let now = Date.now();
  let threeMonth = 90 * 24 * 60 * 60 * 1000;

  const usersSnap = await getDocs(collection(db,"users"));

  for(const u of usersSnap.docs){

    const user = u.data();

    if(user.referredBy == myCode){

      let totalDeposit = 0;
      let lastTime = null;

      const depSnap = await getDocs(
        query(collection(db,"deposits"),
        where("email","==",user.email))
      );

      depSnap.forEach(d=>{
        let data = d.data();

        // 🔥 time fix (time ya timeStamp dono check)
        let t = 0;

if(data.time){
  t = data.time;
}
else if(data.timeStamp){
  if(data.timeStamp.seconds){
    t = data.timeStamp.seconds * 1000;
  } else {
    t = new Date(data.timeStamp).getTime();
  }
}

        if(data.status === "APPROVED" && (now - t <= threeMonth)){

          totalDeposit += Number(data.amount || 0);

          // latest time save
          if(!lastTime || t > lastTime){
            lastTime = t;
          }
        }
      });

      // 🔥 agar kuch deposit mila
      if(totalDeposit > 0){

        html += `
        <div style="background:#fff;padding:10px;margin-top:10px;border-radius:10px;color:#000;">
          📧 ${user.email}<br>
          💰 Total Deposit: ₹${totalDeposit}<br>
          🕒 ${lastTime ? new Date(lastTime).toLocaleString() : "N/A"}
        </div>
        `;
      }

    }
  }

  if(html === ""){
    html = "No data in last 3 months";
  }

  document.getElementById("refDetails").innerHTML = html;
}
