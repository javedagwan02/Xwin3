<style>

<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER NAME */
const name = localStorage.getItem("userName") || "USER";
document.getElementById("userName").innerText = name.toUpperCase();

/* UID */
let uid = localStorage.getItem("uid");
if(!uid){
  uid = Math.floor(1000000 + Math.random()*9000000);
  localStorage.setItem("uid", uid);
}
document.getElementById("uid").innerText = uid;

/* LAST LOGIN */
document.getElementById("lastLogin").innerText =
  localStorage.getItem("lastLogin") || "-";

/* USER EMAIL */
const userEmail = localStorage.getItem("userEmail");

/* LOAD BALANCE */
async function loadBalance(){

  let balance = 0;
  let bonus = 0;

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  snap.forEach(d=>{
    balance = d.data().balance || 0;
    bonus = d.data().bonusBalance || 0;
  });

  document.getElementById("accBalance").innerText =
    "₹" + balance.toFixed(2);

  // 🔥 BONUS SHOW
  document.getElementById("accBonus").innerText =
    bonus.toFixed(2);
}
loadBalance();

/* LOGOUT */
window.logout = function(){
  localStorage.clear();
  location.href = "login.html";
};

/* OPEN POPUP */
window.openChangePass = () => {
  document.getElementById("passPopup").style.display = "flex";
};

/* CLOSE POPUP */
window.closePopup = () => {
  document.getElementById("passPopup").style.display = "none";
};

/* CHANGE PASSWORD */
window.changePassword = async () => {

  const oldPass = document.getElementById("oldPass").value;
  const newPass = document.getElementById("newPass").value;
  const confirm = document.getElementById("confirmPass").value;

  if(!oldPass || !newPass || !confirm){
    return alert("Fill all fields");
  }

  if(newPass !== confirm){
    return alert("Passwords do not match");
  }

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let docId = "";
  let currentPass = "";

  snap.forEach(d=>{
    docId = d.id;
    currentPass = d.data().password;
  });

  if(oldPass !== currentPass){
    return alert("Wrong old password");
  }

  const user = auth.currentUser;

  if(!user){
    return alert("Please login again");
  }

  try{
    // 🔥 Firebase Auth password change
    await updatePassword(user, newPass);

    // 🔥 Firestore update (optional)
    await updateDoc(doc(db,"users",docId),{
      password: newPass
    });

    alert("Password Updated ✅");
    closePopup();

  }catch(err){
    alert(err.message);
  }
};
</script>
  <script>

// 🔥 MIXED USERS (normal + numbers)
const fakeUsers = [
  "aman@gmail.com",
  "rahul@gmail.com",
  "vikas@gmail.com",
  "rohit@gmail.com",
  "ajay@gmail.com",
  "sonu@gmail.com",
  "raj@gmail.com",
  "aman4626@gmail.com",
  "rahul9981@gmail.com",
  "vipul777@gmail.com",
  "king123@gmail.com"
];

// 🔥 FIXED REALISTIC AMOUNTS
const amounts = [500,1000,1500,2000,3000,5000,10000,20000,50000];

// 🔥 RANDOM TIME
function randomTime(){
  let h = Math.floor(Math.random()*12)+1;
  let m = Math.floor(Math.random()*60);
  let ampm = Math.random() > 0.5 ? "AM" : "PM";
  return `${h}:${m < 10 ? "0"+m : m} ${ampm}`;
}

// 🔥 RANDOM USER
function randomUser(){
  return fakeUsers[Math.floor(Math.random()*fakeUsers.length)];
}

// 🔥 RANDOM AMOUNT
function randomAmount(){
  return amounts[Math.floor(Math.random()*amounts.length)];
}

let liveInterval;

// 🔥 OPEN DEPOSIT BOARD
window.openDepositBoard = function(){

  document.getElementById("leaderboardPopup").style.display="flex";
  document.getElementById("boardTitle").innerText = "🏆 User Deposit Leaderboard";

  startLive("deposit");
};

// 🔥 OPEN WITHDRAW BOARD
window.openWithdrawBoard = function(){

  document.getElementById("leaderboardPopup").style.display="flex";
  document.getElementById("boardTitle").innerText = "🏆 User Withdrawal Leaderboard";

  startLive("withdraw");
};

// 🔥 LIVE SYSTEM
function startLive(type){

  clearInterval(liveInterval);

  let list = document.getElementById("boardList");
  list.innerHTML = "";

  liveInterval = setInterval(()=>{

    let icon = type === "deposit" ? "📥" : "📤";

    let newItem = `
    <div style="padding:8px;border-bottom:1px solid #eee;font-size:13px">
      ${icon} ${randomUser()}  
      <br>₹${randomAmount().toLocaleString()} • ${randomTime()}
    </div>`;

    // 🔥 TOP me add (latest first)
    list.innerHTML = newItem + list.innerHTML;

    // 🔥 max 15 items
    if(list.children.length > 15){
      list.removeChild(list.lastChild);
    }

  },1000);
}

// 🔥 CLOSE
function closeBoard(){
  document.getElementById("leaderboardPopup").style.display="none";
  clearInterval(liveInterval);
}

  </script>
  <div id="passPopup" style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center">

    <h3 style="color:#fff;text-align:center">Change Password</h3>

    <input type="password" id="oldPass" placeholder="Old Password" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none">

    <button onclick="changePassword()" style="width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;background:#2ecc71;color:#fff">

background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:99999">

    <div id="boardList" style="max-height:300px;overflow:auto;margin-top:10px"></div>

    <button onclick="closeBoard()"
