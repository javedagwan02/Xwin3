<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top,#1a0033,#0a001a);
  color:#fff;
  padding-bottom:90px;
}

/* HEADER */
.header{
  padding:20px;
}

.profile{
  display:flex;
  gap:12px;
  align-items:center;
}

.profile img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff00cc;
}

.profile h2{
  margin:0;
  font-size:20px;
}

.profile p{
  margin:2px 0;
  font-size:12px;
  color:#ccc;
}

/* BALANCE CARD */
.balance-card{
  margin:15px;
  padding:18px;
  border-radius:20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 0 25px rgba(255,0,255,0.2),
    inset 0 0 15px rgba(255,255,255,0.05);
}

.balance-left p{
  margin:0;
  font-size:13px;
  color:#aaa;
}

.balance-left h1{
  margin:5px 0;
  font-size:32px;
}

.bonus{
  color:#ffd700;
  margin-top:5px;
}

/* ACTION BUTTONS */
.balance-actions{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.balance-actions div{
  text-align:center;
  font-size:13px;
  cursor:pointer;
}

.balance-actions span{
  display:block;
  margin-top:4px;
}

/* HISTORY */
.history{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:15px;
}

.history div{
  padding:16px;
  border-radius:16px;
  text-align:center;
  font-weight:bold;

  background: linear-gradient(135deg,#ff00cc,#7b00ff);
  box-shadow:0 0 15px #ff00cc;
}

/* LEADERBOARD */
.leaderboard{
  display:flex;
  gap:10px;
  margin:0 15px;
}

.leaderboard button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;

  background: linear-gradient(45deg,#ff00cc,#7b00ff);
  color:#fff;
  font-size:13px;

  box-shadow:0 0 10px #ff00cc;
}

/* LOGOUT */
.logout{
  width:calc(100% - 30px);
  margin:15px;
  padding:14px;

  border:none;
  border-radius:14px;

  background:#ff3b3b;
  color:#fff;
  font-size:16px;
}

/* CHANGE PASS */
.change-pass{
  width:calc(100% - 30px);
  margin:0 15px;
  padding:14px;

  border:none;
  border-radius:14px;

  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:#fff;
  font-size:16px;
}

/* NAVBAR */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  background:#0a001a;
  display:flex;

  border-top:1px solid rgba(255,255,255,0.1);
}

.bottom-nav div{
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:12px;
  color:#aaa;
}

.bottom-nav p{
  margin:2px 0 0;
}

.bottom-nav .active{
  color:#ff00cc;
  font-weight:bold;
}
</style>

<body>

<div class="header">
  <div class="profile">
    <img src="https://i.imgur.com/6VBx3io.png">
    <div>
      <h2 id="userName">ARMAN236</h2>

<!-- HISTORY -->
<div class="history">

  </div>
  <div onclick="location.href='withdraw-history.html'">

<!-- LEADERBOARD -->
<div class="leaderboard">

</div>

<!-- LOGOUT -->
<button class="logout" onclick="logout()">Logout</button>

<button class="change-pass" onclick="openChangePass()">
  🔑 Change Password
</button>

<!-- NAVBAR -->
<div class="bottom-nav">
  <div onclick="location.href='index.html'">🏠<p>Home</p></div>
  <div onclick="location.href='wallet.html'">💰<p>Wallet</p></div>
  <div onclick="location.href='promotion.html'">🎁<p>Promotion</p></div>
  <div class="active">👤<p>Account</p></div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER NAME */
const name = localStorage.getItem("userName") || "USER";
document.getElementById("userName").innerText = name.toUpperCase();

/* UID */
let uid = localStorage.getItem("uid");
if(!uid){
  uid = Math.floor(1000000 + Math.random()*9000000);
  localStorage.setItem("uid", uid);
}
document.getElementById("uid").innerText = uid;

/* LAST LOGIN */
document.getElementById("lastLogin").innerText =
  localStorage.getItem("lastLogin") || "-";

/* USER EMAIL */
const userEmail = localStorage.getItem("userEmail");

/* LOAD BALANCE */
async function loadBalance(){

  let balance = 0;
  let bonus = 0;

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  snap.forEach(d=>{
    balance = d.data().balance || 0;
    bonus = d.data().bonusBalance || 0;
  });

  document.getElementById("accBalance").innerText =
    "₹" + balance.toFixed(2);

  // 🔥 BONUS SHOW
  document.getElementById("accBonus").innerText =
    bonus.toFixed(2);
}
loadBalance();

/* LOGOUT */
window.logout = function(){
  localStorage.clear();
  location.href = "login.html";
};

/* OPEN POPUP */
window.openChangePass = () => {
  document.getElementById("passPopup").style.display = "flex";
};

/* CLOSE POPUP */
window.closePopup = () => {
  document.getElementById("passPopup").style.display = "none";
};

/* CHANGE PASSWORD */
window.changePassword = async () => {

  const oldPass = document.getElementById("oldPass").value;
  const newPass = document.getElementById("newPass").value;
  const confirm = document.getElementById("confirmPass").value;

  if(!oldPass || !newPass || !confirm){
    return alert("Fill all fields");
  }

  if(newPass !== confirm){
    return alert("Passwords do not match");
  }

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let docId = "";
  let currentPass = "";

  snap.forEach(d=>{
    docId = d.id;
    currentPass = d.data().password;
  });

  if(oldPass !== currentPass){
    return alert("Wrong old password");
  }

  const user = auth.currentUser;

  if(!user){
    return alert("Please login again");
  }

  try{
    // 🔥 Firebase Auth password change
    await updatePassword(user, newPass);

    // 🔥 Firestore update (optional)
    await updateDoc(doc(db,"users",docId),{
      password: newPass
    });

    alert("Password Updated ✅");
    closePopup();

  }catch(err){
    alert(err.message);
  }
};
</script>

// 🔥 RANDOM TIME
function randomTime(){
  let h = Math.floor(Math.random()*12)+1;
  let m = Math.floor(Math.random()*60);
  let ampm = Math.random() > 0.5 ? "AM" : "PM";
  return `${h}:${m < 10 ? "0"+m : m} ${ampm}`;

    let styles = ["","official","gaming","yt","live","boss","real"];

    let number = Math.floor(Math.random()*100000);

  return Array.from(users);
