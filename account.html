<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  padding-bottom:78px;
  background:linear-gradient(#073f9f,#0b72d8,#063d91);
}

.page{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:7px;
}

/* TOP */
.top-banner{
  height:82px;
  margin:0 -7px 8px;
  background:linear-gradient(#071c64,#0b63d8);
  border-bottom:4px solid #4aa8ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.banner-title{
  width:72%;
  padding:10px;
  text-align:center;
  border-radius:16px;
  background:linear-gradient(135deg,#7d5cff,#d58cff);
  border:3px solid #9be1ff;
  color:#fff141;
  font-size:25px;
  font-weight:900;
  text-shadow:2px 3px #6d1bb5;
  box-shadow:0 4px 0 #3157b8,0 0 14px #7ee6ff;
}

/* CARD */
.card{
  border-radius:16px;
  background:linear-gradient(#1c74e7,#073b9a);
  border:4px solid #4ba6ff;
  box-shadow:0 4px 0 #072e78,inset 0 0 15px rgba(255,255,255,.15);
}

/* PROFILE */
.profile-card{
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
}

.profile-card img{
  width:72px;
  height:72px;
  border-radius:50%;
  border:4px solid #fff;
  box-shadow:0 0 0 4px #25c45a;
}

.profile-info h2{
  margin:0;
  font-size:22px;
  font-weight:900;
  text-shadow:2px 2px #06337d;
}

.profile-info p{
  margin:5px 0 0;
  font-size:14px;
  color:#d9ecff;
  font-weight:bold;
}

.profile-info span{
  color:#29eaff;
}

/* BALANCE */
.balance-card{
  margin-top:10px;
  padding:13px;
}

.balance-title{
  font-size:20px;
  font-weight:900;
  text-shadow:2px 2px #06337d;
}

.balance-amount{
  margin:5px 0;
  font-size:42px;
  font-weight:900;
  color:#ffd21f;
  text-shadow:3px 4px #9b4400;
}

.bonus-pill{
  display:inline-block;
  padding:6px 14px;
  border-radius:25px;
  background:linear-gradient(#7d5cff,#5322be);
  border:3px solid #6cd9ff;
  font-size:16px;
  font-weight:900;
}

.bonus-pill span{
  color:#ffe620;
}

.balance-actions{
  margin-top:12px;
  padding-top:12px;
  border-top:2px solid rgba(255,255,255,.3);
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.action{
  text-align:center;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-shadow:1px 2px #06337d;
}

.action-icon{
  width:54px;
  height:54px;
  margin:0 auto 5px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(#5fd6ff,#0c59d9);
  border:4px solid #65c9ff;
  font-size:27px;
  box-shadow:0 4px 0 #06337d;
}

/* BUTTON GRID */
.grid{
  margin-top:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.big-btn{
  min-height:64px;
  border:none;
  border-radius:15px;
  padding:8px;
  color:white;
  font-size:17px;
  font-weight:900;
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 0 rgba(0,0,0,.35);
  text-shadow:1px 2px rgba(0,0,0,.4);
}

.pink{background:linear-gradient(135deg,#ff41c7,#7b00ff)}
.blue{background:linear-gradient(135deg,#12b8ff,#0056d9)}
.purple{background:linear-gradient(135deg,#c238ff,#6e00d7)}

.full-btn{
  width:100%;
  margin-top:10px;
  padding:13px;
  border:none;
  border-radius:16px;
  color:white;
  font-size:20px;
  font-weight:900;
  box-shadow:0 4px 0 rgba(0,0,0,.35);
}

.logout{background:linear-gradient(#ff5555,#e60028)}
.change-pass{background:linear-gradient(#1fd3ff,#0066e8)}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:430px;
  margin:auto;
  background:linear-gradient(#0645b5,#06246c);
  border:4px solid #4ba6ff;
  border-bottom:none;
  border-radius:20px 20px 0 0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  z-index:50;
}

.nav-item{
  text-align:center;
  padding:7px 0;
  color:#cce7ff;
  font-size:12px;
  font-weight:bold;
}

.nav-item div{
  font-size:23px;
}

.nav-item.active{
  color:#ffe620;
}

/* POPUPS */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.popup-box{
  width:90%;
  max-width:340px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(#1c74e7,#073b9a);
  border:4px solid #4ba6ff;
  color:white;
}

.popup-box h3{
  text-align:center;
  margin-top:0;
}

.popup-box input{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:15px;
}

.popup-box button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

.board-list{
  max-height:320px;
  overflow:auto;
}

.board-item{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.25);
  font-size:14px;
}

@media(max-height:740px){
  .top-banner{height:70px}
  .banner-title{font-size:22px;padding:8px}
  .profile-card img{width:62px;height:62px}
  .profile-info h2{font-size:20px}
  .profile-info p{font-size:13px}
  .balance-amount{font-size:36px}
  .action-icon{width:48px;height:48px;font-size:24px}
  .big-btn{min-height:56px;font-size:15px}
  .full-btn{padding:11px;font-size:18px}
}
</style>
</head>

<body>

<div class="page">

  <div class="top-banner">
    <div class="banner-title">MY ACCOUNT</div>
  </div>

  <div class="card profile-card">
    <img src="https://i.imgur.com/6VBx3io.png">
    <div class="profile-info">
      <h2 id="userName">USER</h2>
      <p>UID: <span id="uid"></span></p>
      <p>Last login: <span id="lastLogin"></span></p>
    </div>
  </div>

  <div class="card balance-card">
    <div class="balance-title">Total Balance</div>
    <div class="balance-amount" id="accBalance">₹0.00</div>
    <div class="bonus-pill">🎁 Bonus: ₹<span id="accBonus">0.00</span></div>

    <div class="balance-actions">
      <div class="action" onclick="location.href='wallet.html'">
        <div class="action-icon">👛</div>Wallet
      </div>
      <div class="action" onclick="location.href='deposit.html'">
        <div class="action-icon">💰</div>Deposit
      </div>
      <div class="action" onclick="location.href='withdraw.html'">
        <div class="action-icon">🏦</div>Withdraw
      </div>
    </div>
  </div>

  <div class="grid">
    <button class="big-btn pink" onclick="location.href='deposit-history.html'">📥 My Deposit<br>History</button>
    <button class="big-btn purple" onclick="location.href='withdraw-history.html'">📤 My Withdraw<br>History</button>
    <button class="big-btn blue" onclick="openDepositBoard()">🏆 Deposit<br>Leaderboard</button>
    <button class="big-btn purple" onclick="openWithdrawBoard()">🏆 Withdrawal<br>Leaderboard</button>
  </div>

  <button class="full-btn logout" onclick="logout()">↪ Logout</button>
  <button class="full-btn change-pass" onclick="openChangePass()">🔑 Change Password</button>

</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'"><div>🏠</div>Home</div>
  <div class="nav-item" onclick="location.href='wallet.html'"><div>🎮</div>Games</div>
  <div class="nav-item" onclick="location.href='promotion.html'"><div>🎁</div>Promotion</div>
  <div class="nav-item active"><div>👤</div>Account</div>
</div>

<div id="passPopup" class="popup">
  <div class="popup-box">
    <h3>🔑 Change Password</h3>
    <input type="password" id="oldPass" placeholder="Old Password">
    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm Password">
    <button onclick="changePassword()" style="background:#18c757">Update Password</button>
    <button onclick="closePopup()" style="background:#e53935">Cancel</button>
  </div>
</div>

<div id="leaderboardPopup" class="popup">
  <div class="popup-box">
    <h3 id="boardTitle"></h3>
    <div id="boardList" class="board-list"></div>
    <button onclick="closeBoard()" style="background:#e53935">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, where, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const name = localStorage.getItem("userName") || "USER";
document.getElementById("userName").innerText = name.toUpperCase();

let uid = localStorage.getItem("uid");
if(!uid){
  uid = Math.floor(1000000 + Math.random()*9000000);
  localStorage.setItem("uid", uid);
}
document.getElementById("uid").innerText = uid;

document.getElementById("lastLogin").innerText =
  localStorage.getItem("lastLogin") || "-";

const userEmail = localStorage.getItem("userEmail");

async function loadBalance(){
  let balance = 0;
  let bonus = 0;

  if(!userEmail) return;

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  snap.forEach(d=>{
    balance = d.data().balance || 0;
    bonus = d.data().bonusBalance || 0;
  });

  document.getElementById("accBalance").innerText = "₹" + Number(balance).toFixed(2);
  document.getElementById("accBonus").innerText = Number(bonus).toFixed(2);
}

loadBalance();

window.logout = function(){
  localStorage.clear();
  location.href = "login.html";
};

window.openChangePass = function(){
  document.getElementById("passPopup").style.display = "flex";
};

window.closePopup = function(){
  document.getElementById("passPopup").style.display = "none";
};

window.changePassword = async function(){
  const oldPass = document.getElementById("oldPass").value;
  const newPass = document.getElementById("newPass").value;
  const confirm = document.getElementById("confirmPass").value;

  if(!oldPass || !newPass || !confirm){
    alert("Fill all fields");
    return;
  }

  if(newPass !== confirm){
    alert("Passwords do not match");
    return;
  }

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let docId = "";
  let currentPass = "";

  snap.forEach(d=>{
    docId = d.id;
    currentPass = d.data().password;
  });

  if(oldPass !== currentPass){
    alert("Wrong old password");
    return;
  }

  const user = auth.currentUser;

  if(!user){
    alert("Please login again");
    return;
  }

  try{
    await updatePassword(user, newPass);
    await updateDoc(doc(db,"users",docId),{ password:newPass });
    alert("Password Updated ✅");
    closePopup();
  }catch(err){
    alert(err.message);
  }
};
</script>

<script>
const boys = ["aman","rahul","rohit","vikas","ajay","sonu","raj","deepak","karan","vipul","sachin","ankit","pankaj","sumit","arjun","ravi","manish","nitesh","harsh","yash","aditya","shivam","gopal","mohit","varun","tarun","kunal","sandeep","vishal","lokesh","rajat","nikhil","prince","suraj","krishna","abhishek","hemant","dinesh","ashish","vivek"];
const girls = ["neha","pooja","khushboo","anjali","priya","sakshi","ritika","simran","komal","payal","sonam","rani","kavita","rekha","meena","seema","jyoti","tina","hina","shweta"];
const depositAmounts = [500,1000,1500,2000,3000,5000,10000,20000,50000];

function randomTime(){
  let h = Math.floor(Math.random()*12)+1;
  let m = Math.floor(Math.random()*60);
  let ampm = Math.random() > 0.5 ? "AM" : "PM";
  return `${h}:${m < 10 ? "0"+m : m} ${ampm}`;
}

function randomName(){
  let all = boys.concat(girls);
  return all[Math.floor(Math.random()*all.length)];
}

function generateUniqueUsers(count){
  let users = new Set();
  while(users.size < count){
    let styles = ["","official","gaming","yt","live","boss","real"];
    let style = styles[Math.floor(Math.random()*styles.length)];
    let number = Math.floor(Math.random()*100000);
    users.add(randomName() + style + number + "@gmail.com");
  }
  return Array.from(users);
}

function randomDepositAmount(){
  return depositAmounts[Math.floor(Math.random()*depositAmounts.length)];
}

function randomWithdrawAmount(){
  return Math.floor(Math.random()*50000) + 500;
}

let liveInterval;

window.openDepositBoard = function(){
  document.getElementById("leaderboardPopup").style.display="flex";
  document.getElementById("boardTitle").innerText = "🏆 User Deposit Leaderboard";
  startLive("deposit");
};

window.openWithdrawBoard = function(){
  document.getElementById("leaderboardPopup").style.display="flex";
  document.getElementById("boardTitle").innerText = "🏆 User Withdrawal Leaderboard";
  startLive("withdraw");
};

function startLive(type){
  clearInterval(liveInterval);

  let list = document.getElementById("boardList");
  list.innerHTML = "";

  let users = generateUniqueUsers(100);
  let index = 0;

  liveInterval = setInterval(()=>{
    if(index >= users.length) index = 0;

    let icon = type === "deposit" ? "📥" : "📤";
    let amount = type === "deposit" ? randomDepositAmount() : randomWithdrawAmount();

    let item = document.createElement("div");
    item.className = "board-item";
    item.innerHTML = `${icon} ${users[index]}<br>₹${amount.toLocaleString()} • ${randomTime()}`;

    list.prepend(item);
    index++;

    if(list.children.length > 15){
      list.removeChild(list.lastChild);
    }
  },1000);
}

window.closeBoard = function(){
  document.getElementById("leaderboardPopup").style.display="none";
  clearInterval(liveInterval);
};
</script>

</body>
</html>
