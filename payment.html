<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  min-height:100vh;
  background:radial-gradient(circle at top,#168cff,#064bb5 45%,#03143f);
}

.page{
  max-width:430px;
  margin:auto;
  padding:10px;
}

.title{
  margin:12px auto 18px;
  width:85%;
  padding:13px;
  text-align:center;
  border-radius:18px;
  background:linear-gradient(135deg,#7d5cff,#d58cff);
  border:4px solid #9be1ff;
  color:#fff141;
  font-size:26px;
  font-weight:900;
  text-shadow:2px 3px #6d1bb5;
}

.box{
  padding:16px;
  border-radius:22px;
  text-align:center;
  background:linear-gradient(#1d85ff,#073b9a);
  border:5px solid #62caff;
  box-shadow:0 6px 0 #062b78;
}

.info{
  background:#dcecff;
  color:#195aa2;
  padding:12px;
  border-radius:14px;
  border:4px solid #75cfff;
  font-size:18px;
  font-weight:900;
}

.info span{
  color:#ff9f13;
}

.qr{
  margin-top:16px;
  background:#fff;
  padding:10px;
  border-radius:16px;
  width:260px;
  max-width:95%;
  border:5px solid #fff;
  box-shadow:0 6px 0 #062b78;
}

.upi{
  background:#dcecff;
  color:#073b9a;
  padding:14px;
  border-radius:14px;
  margin-top:14px;
  font-size:20px;
  font-weight:900;
  border:4px solid #75cfff;
  word-break:break-word;
}

input{
  width:100%;
  padding:15px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  background:#dcecff;
  color:#174d91;
  font-size:16px;
  font-weight:bold;
}

button{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
}

.copy{
  background:linear-gradient(#7d5cff,#5322be);
  color:#fff;
  box-shadow:0 5px 0 #321278;
}

.payapp{
  background:linear-gradient(#fff36b,#ff9f13);
  color:#9b3b00;
  box-shadow:0 5px 0 #b86400;
}

.submit{
  background:linear-gradient(#6dff5c,#11b51b);
  color:#fff;
  box-shadow:0 5px 0 #087c12;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup div{
  background:linear-gradient(#1d85ff,#073b9a);
  border:5px solid #62caff;
  padding:22px;
  border-radius:18px;
  width:85%;
  text-align:center;
  color:#fff;
}

.popup button{
  background:linear-gradient(#fff36b,#ff9f13);
  color:#9b3b00;
}
</style>
</head>

<body>

<div class="page">

  <div class="title">COMPLETE PAYMENT</div>

  <div class="box">

    <div class="info">
      Amount: ₹<span id="amountText"></span><br>
      Method: <span id="methodText"></span>
    </div>

    <img id="qrImg" class="qr">

    <div class="upi" id="upiText"></div>

    <button class="copy" onclick="copyUPI()">Copy UPI</button>
    <button class="payapp" onclick="openUPIApp()">Open Payment App</button>

    <input type="text" id="utr" placeholder="Enter UTR Number">

    <button class="submit" onclick="submitUTR()">Submit UTR</button>

  </div>

</div>

<div class="popup" id="popup">
  <div>
    <h3 id="popupText"></h3>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);

const amount = Number(params.get("amount"));
const method = params.get("method");
const upi = params.get("upi");

document.getElementById("amountText").innerText = amount;
document.getElementById("methodText").innerText = method;
document.getElementById("upiText").innerText = upi;

const upiUrl = `upi://pay?pa=${upi}&pn=ColourCash&am=${amount}&cu=INR`;
const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiUrl)}`;

document.getElementById("qrImg").src = qrUrl;

window.copyUPI = function(){
  navigator.clipboard.writeText(upi);
  showPopup("UPI copied");
}

window.openUPIApp = function(){
  window.location.href = upiUrl;
}

window.submitUTR = async function(){
  let utr = document.getElementById("utr").value.trim();

  if(!amount || amount < 100){
    showPopup("Invalid amount");
    return;
  }

  if(utr.length < 10){
    showPopup("Enter valid UTR number");
    return;
  }

  const userEmail = localStorage.getItem("userEmail");

  if(!userEmail){
    showPopup("Login required");
    return;
  }

  let referredBy = null;

  const userSnap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  userSnap.forEach(d=>{
    referredBy = d.data().referredBy || null;
  });

  let wheelType = 0;

  if(amount >= 1000){
    wheelType = 1000;
  }else if(amount >= 500){
    wheelType = 500;
  }else if(amount >= 100){
    wheelType = 100;
  }

  showPopup("Submitting...");

  addDoc(collection(db,"deposits"),{
    email:userEmail,
    amount:amount,
    bonus:Math.floor(amount * 0.20),
    utr:utr,
    method:method,
    upi:upi,
    status:"PENDING",
    time:Date.now(),
    referredBy:referredBy,
    wheel:wheelType
  })
  .then(()=>{
    showPopup("Deposit Submitted ✅");
    document.getElementById("utr").value="";
  })
  .catch(e=>{
    showPopup("Error: " + e.message);
  });
}

window.showPopup = function(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
